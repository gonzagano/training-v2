<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GG Training">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>GG-Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   GG-TRAINING — Design System
   Desktop: sidebar layout (admin)
   Mobile: bottom nav layout (athletes)
══════════════════════════════════════════ */
:root {
  /* Palette: dark navy + crimson accent + white */
  --bg:#0f1117;       /* page bg */
  --bg2:#161b27;      /* sidebar, cards */
  --bg3:#1e2535;      /* inputs, elevated surfaces */
  --bg4:#263042;      /* hover states */
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#f0f4ff;
  --text2:#8899bb;
  --text3:#4a5a7a;
  /* Accent: crimson red */
  --accent:#e03458;
  --accent-dim:rgba(224,52,88,0.12);
  --accent-dim2:rgba(224,52,88,0.06);
  --accent-hover:#f0405e;
  /* Semantic */
  --green:#34c97a;  --green-dim:rgba(52,201,122,0.12);
  --amber:#f0a030;  --amber-dim:rgba(240,160,48,0.12);
  --red:#e03458;    --red-dim:rgba(224,52,88,0.12);
  --blue:#4a9eff;   --blue-dim:rgba(74,158,255,0.12);
  --purple:#9b6fff; --purple-dim:rgba(155,111,255,0.12);
  --teal:#2dd4bf;   --teal-dim:rgba(45,212,191,0.12);
  /* Aliases for legacy code */
  --purple:#e03458; --purple-dim:rgba(224,52,88,0.12); --purple-dim2:rgba(224,52,88,0.06);
  /* Radius */
  --r:12px; --rsm:8px; --rxs:6px;
  /* Sidebar */
  --sidebar-w:260px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;overflow:hidden}

/* ── MOBILE BASE (athletes) ──────────────────── */
body{background:var(--bg);color:var(--text);font-size:15px}

#app{height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg)}
#app-inner{display:flex;flex-direction:column;flex:1;min-height:0;width:100%;max-width:600px;margin:0 auto;position:relative}
#topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;position:relative;z-index:10}
#subnav{flex-shrink:0;display:flex;gap:6px;padding:10px 18px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
#subnav::-webkit-scrollbar{display:none}
#main{flex:1;overflow-y:auto;padding:16px 18px 90px;scroll-behavior:smooth}
#bottombar{display:flex;background:var(--bg2);border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;z-index:100}

/* ── DESKTOP OVERRIDE (admin, ≥900px) ───────── */
@media (min-width:900px) {
  body{background:#0a0d14}
  #app{flex-direction:row;height:100vh;overflow:hidden}
  #app-inner{max-width:none;flex-direction:row;flex:1}

  /* SIDEBAR */
  #topbar{
    position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;
    flex-direction:column;align-items:flex-start;justify-content:flex-start;
    padding:28px 20px;background:var(--bg2);border-right:1px solid var(--border);
    z-index:200;overflow-y:auto;gap:0
  }
  #subnav{display:none}
  #bottombar{display:none}
  /* Main content area */
  #main{
    margin-left:var(--sidebar-w);padding:32px 40px 40px;max-width:none;
    overflow-y:auto;flex:1;height:100vh
  }
  /* Desktop: week pill in sidebar */
  #week-pill{display:block!important}
}

/* ── AUTH ─────────────────────────────────────── */
#auth-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:500;align-items:center;justify-content:center}
#auth-screen.visible{display:flex}
.auth-box{width:100%;max-width:380px;padding:0 24px}
.auth-logo{font-size:28px;font-weight:800;letter-spacing:-.03em;color:var(--text);margin-bottom:6px}
.auth-logo span{color:var(--accent)}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.auth-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);padding:12px 14px;color:var(--text);font-size:15px;outline:none;margin-bottom:10px;transition:border-color .15s;font-family:inherit}
.auth-inp:focus{border-color:var(--accent)}
.auth-btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:var(--rsm);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .15s;font-family:inherit}
.auth-btn:hover{background:var(--accent-hover)}
.auth-err{font-size:13px;color:var(--red);margin-top:10px;min-height:18px;text-align:center}
.auth-switch{font-size:13px;color:var(--text2);margin-top:16px;text-align:center;cursor:pointer}
.auth-switch span{color:var(--accent);font-weight:600}

/* ── TOPBAR / SIDEBAR ────────────────────────── */
.app-logo{font-size:15px;font-weight:700;letter-spacing:-.02em;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:0}
.topbar-right{display:flex;align-items:center;gap:8px}
.week-pill{font-size:12px;background:var(--accent-dim);color:var(--accent);padding:4px 10px;border-radius:20px;border:1px solid rgba(224,52,88,0.25);white-space:nowrap}
.avatar-btn{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(224,52,88,0.3);color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Desktop sidebar nav items */
.sidebar-nav{display:none}
@media(min-width:900px){
  .app-logo{margin-bottom:36px}
  .topbar-right{display:none}
  .sidebar-nav{display:flex;flex-direction:column;gap:4px;width:100%;flex:1}
  .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rsm);font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s;font-family:inherit}
  .sidebar-item svg{width:18px;height:18px;flex-shrink:0}
  .sidebar-item:hover{background:var(--bg3);color:var(--text)}
  .sidebar-item.active{background:var(--accent-dim);color:var(--accent)}
  .sidebar-section{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:16px 12px 6px;margin-top:8px}
  .sidebar-footer{margin-top:auto;padding-top:20px;border-top:1px solid var(--border);width:100%}
  .sidebar-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rsm);cursor:pointer;transition:background .15s}
  .sidebar-user:hover{background:var(--bg3)}
  .sidebar-user-av{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(224,52,88,0.3);color:var(--accent);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sidebar-user-info{flex:1;min-width:0}
  .sidebar-user-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sidebar-user-role{font-size:11px;color:var(--text3)}
  /* Desktop week display */
  .desktop-week{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px;margin-bottom:12px;width:100%}
  .desktop-week-label{font-size:13px;font-weight:600;color:var(--text)}
  .desktop-week-sub{font-size:11px;color:var(--text3)}
  .desktop-week-btns{display:flex;gap:4px}
  /* Desktop content header */
  .page-header{margin-bottom:28px}
  .page-title{font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--text);line-height:1.2}
  .page-subtitle{font-size:14px;color:var(--text2);margin-top:4px}
  /* Desktop metric cards */
  .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
  .metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px}
  .metric-card-label{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
  .metric-card-value{font-size:32px;font-weight:800;color:var(--text);line-height:1}
  .metric-card-sub{font-size:12px;color:var(--text3);margin-top:6px}
  .metric-card-icon{opacity:.6}
  /* Desktop two-column layout */
  .desktop-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .desktop-cols.single{grid-template-columns:1fr}
  .desktop-cols.wide{grid-template-columns:2fr 1fr}
}

/* ── BOTTOM BAR (mobile only) ────────────────── */
.bb-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0 14px;cursor:pointer;color:var(--text3);border:none;background:none;font-size:10px;letter-spacing:.04em;transition:color .15s;font-family:inherit}
.bb-btn svg{width:21px;height:21px}
.bb-btn.active{color:var(--accent)}

/* ── SUBNAV TABS ─────────────────────────────── */
.snav-tab{flex-shrink:0;font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.snav-tab.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(224,52,88,0.3)}
.snav-tab.done{border-color:rgba(52,201,122,0.3);color:var(--green)}

/* ── CARDS ──────────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
@media(min-width:900px){.card{margin-bottom:0}}

/* ── BLOCKS ─────────────────────────────────── */
.block-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s}
.block-header:hover{background:var(--bg3)}
.block-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.05em;white-space:nowrap}
.b1 .block-badge{background:var(--teal-dim);color:var(--teal)}
.b2 .block-badge{background:var(--blue-dim);color:var(--blue)}
.b3 .block-badge{background:var(--accent-dim);color:var(--accent)}
.b4 .block-badge{background:var(--amber-dim);color:var(--amber)}
.bx .block-badge{background:var(--bg3);color:var(--text2)}
.block-title-wrap{flex:1;min-width:0}
.block-title{font-size:14px;font-weight:600;cursor:text;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.block-title-inp{font-size:14px;font-weight:600;background:var(--bg3);border:1px solid var(--accent);border-radius:var(--rxs);padding:2px 8px;width:100%;color:var(--text);outline:none;display:none;font-family:inherit}
.block-time{font-size:11px;color:var(--text3);white-space:nowrap}
.block-chevron{color:var(--text3);font-size:18px;transition:transform .2s;flex-shrink:0}
.block.open .block-chevron{transform:rotate(90deg)}
.block-body{display:none;padding:0 16px 16px}
.block.open .block-body{display:block}
.block-note{font-size:12px;color:var(--text3);font-style:italic;margin-bottom:12px;padding:8px 10px;background:var(--bg3);border-radius:var(--rxs);border-left:2px solid var(--accent-dim)}
.block-del{width:22px;height:22px;border-radius:50%;background:var(--red-dim);border:none;color:var(--red);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.5;transition:opacity .15s}
.block-del:hover{opacity:1}

/* ── CATEGORY ────────────────────────────────── */
.cat-header{display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px}
.cat-header:first-of-type{margin-top:0}
.cat-label-wrap{display:flex;align-items:center;gap:6px}
.cat-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;cursor:text}
.cat-label-inp{font-size:10px;font-weight:700;background:var(--bg3);border:1px solid var(--accent);border-radius:3px;padding:1px 6px;color:var(--text2);outline:none;display:none;letter-spacing:.08em;text-transform:uppercase;font-family:inherit}
.cat-del{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:3px;border:1px solid var(--border);transition:all .15s}
.cat-del:hover{color:var(--red);border-color:rgba(224,52,88,0.3)}
.cat-divider{border:none;border-top:1px solid var(--border);margin:12px 0}

/* ── EXERCISE ROW ────────────────────────────── */
.ex-row{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.ex-row:last-of-type{border-bottom:none}
.ex-check{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:5px;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ex-check.checked{background:var(--accent);border-color:var(--accent)}
.ex-check.checked::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.ex-main{flex:1;min-width:0}
.ex-name-row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.ex-name{font-size:14px;font-weight:500;color:var(--text);cursor:pointer;flex:1;min-width:0;word-break:break-word}
.ex-name-inp{font-size:14px;color:var(--text);background:var(--bg3);border:1px solid var(--accent);border-radius:var(--rxs);padding:3px 8px;width:100%;outline:none;display:none;font-family:inherit}
.ex-actions{display:flex;gap:4px;flex-shrink:0}
.ex-icon-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rxs);cursor:pointer;color:var(--text3);font-size:11px;transition:all .15s;flex-shrink:0}
.ex-icon-btn.has-video{background:rgba(255,0,0,0.08);border-color:rgba(255,60,60,0.25);color:#ff6b6b}
.ex-icon-btn.del-ex:hover{background:var(--red-dim);border-color:rgba(224,52,88,0.3);color:var(--red)}
.ex-fields{display:flex;gap:5px;flex-wrap:wrap}
.field-box{display:flex;flex-direction:column;gap:3px}
.field-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.field-inp{font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rxs);padding:6px 7px;color:var(--text);width:60px;text-align:center;outline:none;transition:border-color .15s;font-family:inherit}
.field-inp:focus{border-color:var(--accent)}
.field-inp.load{width:72px;border-color:rgba(52,201,122,0.3)}
.field-inp.load:focus{border-color:var(--green)}
.field-inp.vbt{border-color:rgba(74,158,255,0.3);color:var(--blue);width:64px}
.field-inp.vbt:focus{border-color:var(--blue)}

/* ── INTENSITY SELECTOR (RPE/RIR) ────────────── */
.intensity-sel{display:flex;gap:4px;align-items:center}
.intensity-type-btn{font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;font-family:inherit}
.intensity-type-btn.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(224,52,88,0.3)}

/* ── ADD BUTTONS ─────────────────────────────── */
.add-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;padding:8px 2px 0;background:none;border:none;width:100%;transition:color .15s;font-family:inherit}
.add-btn:hover{color:var(--text2)}
.add-block-btn{width:100%;padding:13px;background:transparent;border:1px dashed var(--border2);border-radius:var(--r);color:var(--text3);font-size:13px;cursor:pointer;margin-bottom:12px;transition:all .15s;font-family:inherit}
.add-block-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── RPE SLIDER ──────────────────────────────── */
.rpe-row{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.rpe-lbl{font-size:12px;color:var(--text2);white-space:nowrap}
.rpe-slider{flex:1;accent-color:var(--accent)}
.rpe-val{font-size:13px;font-weight:600;color:var(--accent);min-width:20px;text-align:center}
.finish-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;transition:background .15s;font-family:inherit}
.finish-btn:hover{background:var(--accent-hover)}
.finish-btn:active{opacity:.85}

/* ── ADMIN PANEL ─────────────────────────────── */
.admin-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.admin-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:12px 16px 8px}
.admin-item{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;gap:10px;border-top:1px solid var(--border)}
.admin-item:first-of-type{border-top:none}
.admin-item-lbl{font-size:14px;font-weight:500;color:var(--text)}
.admin-item-sub{font-size:12px;color:var(--text3);margin-top:2px}
.abtn{font-size:12px;font-weight:600;padding:6px 13px;border-radius:var(--rxs);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.abtn:hover{background:var(--bg4);color:var(--text)}
.abtn-p{background:var(--accent);border-color:var(--accent);color:#fff!important}
.abtn-p:hover{background:var(--accent-hover)!important;border-color:var(--accent-hover)!important}
.abtn-d{background:var(--red-dim);border-color:rgba(224,52,88,0.3);color:var(--red)!important}
.abtn-d:hover{background:rgba(224,52,88,0.25)!important}

/* ── TEAM DETAIL ─────────────────────────────── */
.team-detail-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.team-detail-title{font-size:18px;font-weight:700;flex:1}
.team-sport-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(224,52,88,0.2)}
.back-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-family:inherit}
.back-btn:hover{background:var(--bg4);color:var(--text)}
.team-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;cursor:pointer;margin-bottom:10px;transition:all .15s}
.team-card:hover{background:var(--bg3);border-color:var(--border2)}
.team-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.team-name{font-size:15px;font-weight:600}
.team-meta{font-size:12px;color:var(--text3)}
.team-sport-badge{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--accent-dim);color:var(--accent)}
.training-day-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.player-note{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border-radius:var(--rxs);margin-bottom:4px;font-size:13px}
.player-note-name{font-size:11px;font-weight:600;color:var(--accent);white-space:nowrap}
.player-note-text{color:var(--text2);flex:1;font-size:12px}

/* ── WELLNESS ────────────────────────────────── */
.hooper-item{display:flex;flex-direction:column;gap:6px;padding:14px 16px;border-bottom:1px solid var(--border)}
.hooper-item:last-child{border-bottom:none}
.hooper-label{font-size:14px;font-weight:500;color:var(--text)}
.hooper-scale{display:flex;gap:5px}
.hooper-dot{flex:1;height:32px;border-radius:var(--rxs);border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg3)}
.hooper-dot.sel{border-color:transparent}
.hooper-score-box{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px}
.hooper-score-val{font-size:40px;font-weight:800;line-height:1}
.hooper-score-label{font-size:13px;color:var(--text2)}
.body-zone-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;gap:12px}
.body-zone-svg{flex:1}
.body-zone{cursor:pointer;transition:all .2s;fill:var(--bg3);stroke:var(--border2);stroke-width:1}
.body-zone:hover{fill:rgba(224,52,88,0.15);stroke:var(--accent)}
.body-zone.sel-low{fill:rgba(52,201,122,0.2);stroke:var(--green)}
.body-zone.sel-med{fill:rgba(240,160,48,0.25);stroke:var(--amber)}
.body-zone.sel-high{fill:rgba(224,52,88,0.3);stroke:var(--red)}
.injury-list{padding:0}
.injury-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.injury-item:last-child{border-bottom:none}
.injury-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.injury-info{flex:1}
.injury-zone{font-size:13px;font-weight:500}
.injury-pain{font-size:12px;color:var(--text3);margin-top:1px}
.zone-detail{padding:14px;background:var(--bg3);border-radius:var(--rsm);margin-top:10px}
.pain-scale{display:flex;gap:4px;margin:8px 0}
.pain-dot{flex:1;height:28px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--bg4);transition:all .15s}
.pain-dot.active{border-color:transparent}
.pain-note-inp{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:var(--rxs);padding:7px 10px;color:var(--text);font-size:13px;outline:none;margin-top:8px;resize:none;font-family:inherit}

/* ── PROGRESS / STATS ────────────────────────── */
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.week-nav-label{font-size:15px;font-weight:600;flex:1;text-align:center}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-val{font-size:28px;font-weight:800;color:var(--text)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.session-dots{display:flex;gap:4px}
.session-dot{width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1px solid var(--border)}
.session-dot.done{background:var(--green);border-color:var(--green)}
.load-chart{display:flex;align-items:flex-end;gap:3px;height:60px;margin-top:8px}
.load-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.load-bar{width:100%;border-radius:2px 2px 0 0;background:var(--accent-dim);border:1px solid rgba(224,52,88,0.2);transition:height .3s;min-height:2px}
.load-bar.cur{background:var(--accent);border-color:var(--accent)}
.load-bar-label{font-size:9px;color:var(--text3);text-align:center}

/* ── PROFILE MENU ────────────────────────────── */
.profile-menu{position:fixed;top:54px;right:max(12px,calc(50% - 294px));max-width:240px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:220px;z-index:300;overflow:hidden;opacity:0;pointer-events:none;transform:scale(.96) translateY(-8px);transform-origin:top right;transition:all .15s}
.profile-menu.open{opacity:1;pointer-events:all;transform:scale(1) translateY(0)}
.profile-info{padding:14px 16px;border-bottom:1px solid var(--border)}
.profile-info-name{font-size:14px;font-weight:600}
.profile-info-email{font-size:12px;color:var(--text3);margin-top:1px}
.profile-info-role{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--accent-dim);color:var(--accent);display:inline-block;margin-top:6px}
.profile-menu-item{padding:11px 16px;font-size:14px;cursor:pointer;transition:background .15s}
.profile-menu-item:hover{background:var(--bg3)}
.profile-menu-item.danger{color:var(--red)}
.profile-menu-sep{height:1px;background:var(--border)}

/* ── SETTINGS ────────────────────────────────── */
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px}
.settings-item:last-child{border-bottom:none}
.settings-lbl{color:var(--text);font-weight:500}
.settings-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* ── LIBRARY ─────────────────────────────────── */
.lib-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
.lib-overlay.open{opacity:1;pointer-events:all}
.lib-sheet{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;width:100%;max-height:80vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s;border-top:1px solid var(--border2)}
.lib-overlay.open .lib-sheet{transform:translateY(0)}
.lib-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid var(--border)}
.lib-title{font-size:15px;font-weight:700}
.lib-close{font-size:22px;color:var(--text3);cursor:pointer;line-height:1;padding:0 4px}
.lib-search-wrap{padding:10px 16px;border-bottom:1px solid var(--border)}
.lib-search{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);padding:9px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.lib-search:focus{border-color:var(--accent)}
.lib-filters{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);flex-shrink:0}
.lib-filters::-webkit-scrollbar{display:none}
.lib-filter{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.lib-filter.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(224,52,88,0.3)}
.lib-list{overflow-y:auto;flex:1;padding:8px 0}
.lib-item{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;transition:background .15s;font-size:14px}
.lib-item:hover{background:var(--bg3)}
.lib-item-name{font-weight:500;color:var(--text)}
.lib-item-tags{font-size:11px;color:var(--text3);margin-top:2px}
.lib-item-add{width:26px;height:26px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.lib-new-wrap{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.lib-new-inp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
.lib-new-btn{background:var(--accent);border:none;border-radius:var(--rsm);color:#fff;font-size:13px;font-weight:600;padding:8px 14px;cursor:pointer;white-space:nowrap;font-family:inherit}

/* ── VIDEO MODAL ─────────────────────────────── */
.video-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:450;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:20px;backdrop-filter:blur(4px)}
.video-modal.open{opacity:1;pointer-events:all}
.video-modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:400px;padding:18px}
.video-modal-title{font-size:14px;font-weight:600;margin-bottom:10px}
.video-url-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);padding:9px 12px;color:var(--text);font-size:13px;outline:none;margin-bottom:10px;font-family:inherit}
.video-url-inp:focus{border-color:var(--accent)}
.video-preview{width:100%;border-radius:var(--rsm);margin-bottom:10px;aspect-ratio:16/9;background:var(--bg3)}
.video-modal-btns{display:flex;gap:8px;justify-content:flex-end}

/* ── MISC ────────────────────────────────────── */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;line-height:1.6}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 18px;font-size:13px;color:var(--text);opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none;font-weight:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:900px){.toast{bottom:24px}}

/* ── EVALUACIONES ────────────────────────────── */
.eval-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.eval-title{font-size:16px;font-weight:700}
.eval-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.eval-section-hdr{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .15s}
.eval-section-hdr:hover{background:var(--bg3)}
.eval-section-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.eval-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(224,52,88,0.2)}
.eval-section-body{padding:0 16px 16px;display:none}
.eval-section.open .eval-section-body{display:block}
.eval-section.open .eval-chevron{transform:rotate(90deg)}
.eval-chevron{color:var(--text3);font-size:18px;transition:transform .2s}
.eval-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.eval-field{display:flex;flex-direction:column;gap:4px}
.eval-field.full{grid-column:1/-1}
.eval-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.eval-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rxs);padding:9px 11px;color:var(--text);font-size:14px;outline:none;width:100%;transition:border-color .15s;font-family:inherit}
.eval-inp:focus{border-color:var(--accent)}
.eval-secondary{display:none;grid-column:1/-1}
.eval-secondary.visible{display:contents}
.eval-toggle-secondary{font-size:11px;color:var(--text3);cursor:pointer;text-decoration:underline;margin-top:4px;display:inline-block;grid-column:1/-1}
.eval-toggle-secondary:hover{color:var(--accent)}
.eval-submit{width:100%;padding:12px;background:var(--accent);border:none;border-radius:var(--rsm);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;grid-column:1/-1;transition:background .15s;font-family:inherit}
.eval-submit:hover{background:var(--accent-hover)}
.eval-calc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:12px;margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.eval-calc-item{text-align:center}
.eval-calc-val{font-size:22px;font-weight:800;color:var(--accent)}
.eval-calc-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.eval-calc-item.highlight .eval-calc-val{color:var(--amber)}
.eval-history{margin-top:14px}
.eval-history-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.eval-record{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--bg3);border-radius:var(--rxs);margin-bottom:5px;font-size:13px}
.eval-record-date{color:var(--text3);font-size:11px}
.eval-record-main{font-weight:600;color:var(--text)}
.eval-record-del{color:var(--text3);cursor:pointer;font-size:16px;padding:0 4px}
.eval-record-del:hover{color:var(--red)}
.eval-chart-wrap{background:var(--bg3);border-radius:var(--rsm);padding:14px;margin-top:12px}
.eval-chart-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
canvas.eval-chart{width:100%!important;display:block}
.eval-no-data{font-size:13px;color:var(--text3);text-align:center;padding:20px 0}

/* ── LOADING ─────────────────────────────────── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:600}
.loading-logo{font-size:36px;font-weight:800;letter-spacing:-.03em;color:var(--text)}
.loading-logo span{color:var(--accent)}

// ── AUTH MODE ─────────────────────────────────────────────────
let authMode = 'login';
function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('auth-sub').textContent = authMode === 'login' ? 'Tu sistema de entrenamiento' : 'Crear cuenta nueva';
  document.getElementById('auth-btn').textContent = authMode === 'login' ? 'Iniciar sesión' : 'Registrarse';
  document.getElementById('auth-name').style.display = authMode === 'register' ? 'block' : 'none';
  document.getElementById('auth-switch').innerHTML = authMode === 'login'
    ? '¿No tenés cuenta? <span>Registrarse</span>'
    : '¿Ya tenés cuenta? <span>Iniciar sesión</span>';
  document.getElementById('auth-err').textContent = '';
}
window.toggleAuthMode = toggleAuthMode;

async function authAction() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const name = document.getElementById('auth-name').value.trim();
  const errEl = document.getElementById('auth-err');
  errEl.textContent = '';
  try {
    if (authMode === 'register') {
      if (!name) { errEl.textContent = 'Ingresá tu nombre'; return; }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, 'users', cred.user.uid), {
        name, email, role: 'athlete', createdAt: serverTimestamp()
      });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e) {
    const msgs = {
      'auth/user-not-found':'Email no encontrado',
      'auth/wrong-password':'Contraseña incorrecta',
      'auth/email-already-in-use':'Email ya registrado',
      'auth/weak-password':'Contraseña muy corta (mín. 6 caracteres)',
      'auth/invalid-email':'Email inválido',
      'auth/invalid-credential':'Email o contraseña incorrectos',
    };
    errEl.textContent = msgs[e.code] || e.message;
  }
}
window.authAction = authAction;

async function signOut() {
  await fbSignOut(auth);
  toggleProfileMenu(true);
}
window.signOut = signOut;

// ── AUTH STATE ────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  document.getElementById('loading').style.display = 'none';
  if (!user) {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return;
  }
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  S.user = user;
  S.isAdmin = user.email === ADMIN_EMAIL;

  // Load user data from Firestore
  const uRef = doc(db, 'users', user.uid);
  const uSnap = await getDoc(uRef);
  if (uSnap.exists()) {
    S.userData = uSnap.data();
  } else {
    S.userData = { name: user.email.split('@')[0], email: user.email, role: 'athlete' };
    await setDoc(uRef, { ...S.userData, createdAt: serverTimestamp() });
  }

  // Load personal data
  const pRef = doc(db, 'personal', user.uid);
  const pSnap = await getDoc(pRef);
  if (pSnap.exists()) {
    const d = pSnap.data();
    if (d.videos) S.videos = d.videos;
    if (d.evals) S.evals = d.evals;
    if (d.history) S.history = d.history;
    if (d.wellness) S.wellness = d.wellness;
    if (d.injuries) S.injuries = d.injuries;
    if (d.currentWeek) S.currentWeek = d.currentWeek;
    if (d.startDate) S.startDate = d.startDate;
    if (d.library) S.library = d.library;
    // blocks only loaded for admin (athletes get them from assigned routine)
    if (S.isAdmin && d.blocks) S.blocks = d.blocks;
  }

  if (S.isAdmin) {
    // Load teams
    const tSnap = await getDocs(collection(db, 'teams'));
    S.teams = tSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Load all routines
    const rSnap = await getDocs(collection(db, 'routines'));
    S.routines = rSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  } else {
    // Athlete: load assigned routine from their user doc
    const assignedId = S.userData.assignedRoutine || null;
    if (assignedId) {
      const rSnap = await getDoc(doc(db, 'routines', assignedId));
      if (rSnap.exists()) {
        S.assignedRoutine = { id: assignedId, ...rSnap.data() };
        S.currentRoutineSessions = Object.keys(S.assignedRoutine.sessions || {});
        if (S.currentRoutineSessions.length) S.currentSession = S.currentRoutineSessions[0];
        // blocks are read-only from routine; don't overwrite with personal
      }
    }
  }

  // Update profile menu
  document.getElementById('pm-name').textContent = S.userData.name || '—';
  document.getElementById('pm-email').textContent = S.userData.email || '—';
  document.getElementById('pm-role').textContent = S.isAdmin ? 'admin' : 'atleta';
  const initial = (S.userData.name || 'U')[0].toUpperCase();
  ['avatar-btn','avatar-btn-mobile'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.textContent=initial;
  });
  if (S.isAdmin) {
    document.getElementById('pm-admin').style.display = 'block';
  }

  renderBottomBar();
  renderAll();
});

// ── SAVE ──────────────────────────────────────────────────────
let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirestore, 1500);
}

async function saveToFirestore() {
  if (!S.user) return;
  try {
    // Athletes with assigned routines don't save blocks (read-only from routine)
    const dataToSave = {
      videos: S.videos, history: S.history, evals: S.evals||{},
      wellness: S.wellness, injuries: S.injuries,
      currentWeek: S.currentWeek, startDate: S.startDate,
      updatedAt: serverTimestamp()
    };
    if (S.isAdmin) {
      // Admin saves their own personal blocks AND library
      dataToSave.blocks = S.blocks;
      dataToSave.library = S.library;
    }
    await setDoc(doc(db, 'personal', S.user.uid), dataToSave, { merge: true });
  } catch(e) { console.error('Save error', e); }
}

// ── HELPERS ───────────────────────────────────────────────────
function genId() { return 'x' + Date.now() + Math.floor(Math.random()*9999); }
function sessionKey(w,s) { return `w${w}-${s}`; }
function getSD(w,s) {
  const k=sessionKey(w,s);
  if(!S.history[k]) S.history[k]={date:null,exercises:{},rpe:7.5,done:false};
  return S.history[k];
}
function getED(w,s,id) {
  const sd=getSD(w,s);
  if(!sd.exercises[id]) sd.exercises[id]={series:'',reps:'',pct:'',ms:'',load:'',rpe:'',checked:false};
  return sd.exercises[id];
}
function weekLabel(w) {
  const base=new Date(S.startDate);
  base.setDate(base.getDate()+(w-1)*7);
  const end=new Date(base); end.setDate(end.getDate()+6);
  const f=d=>d.toLocaleDateString('es-AR',{day:'numeric',month:'short'});
  return `${f(base)} – ${f(end)}`;
}
function rpeDesc(v) {
  v=parseFloat(v);
  if(v<=6) return 'suave';
  if(v<=7) return 'moderado';
  if(v<=8.5) return 'moderado–alto';
  return 'alto';
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function countChecked(w) {
  let n=0;
  getSessionList().forEach(s=>{
    const sd=getSD(w,s);
    Object.values(sd.exercises).forEach(e=>{if(e.checked)n++;});
  });
  return n;
}

function renderAll() { renderSubnav(); renderMain(); }

function renderSubnav() {
  const nav=document.getElementById('subnav');
  const wp=document.getElementById('week-pill'); if(wp) wp.textContent=`Sem ${S.currentWeek}`;
  const dwl=document.getElementById('desktop-week-label'); if(dwl) dwl.textContent=`Semana ${S.currentWeek}`;
  if(S.currentView!=='session') { nav.innerHTML=''; return; }
  // Sessions: for admin use A/B/C/D; for athlete with routine use routine session names
  const sessions = getSessionList();
  nav.innerHTML=sessions.map(s=>{
    const sd=getSD(S.currentWeek,s);
    const done=sd.done;
    const active=S.currentSession===s;
    return `<button class="snav-tab ${active?'active':''} ${done&&!active?'done':''}"
      onclick="selectSession('${s}')">${done&&!active?'✓ ':''}${s}</button>`;
  }).join('');
}

function getSessionList() {
  if (S.isAdmin) return ['A','B','C','D'];
  if (S.assignedRoutine && S.currentRoutineSessions.length) return S.currentRoutineSessions;
  return ['A','B','C','D'];
}
window.getSessionList=getSessionList;

function getCurrentBlocks() {
  if (S.isAdmin) return S.blocks;
  if (S.assignedRoutine) {
    const ses = S.assignedRoutine.sessions || {};
    return ses[S.currentSession] || [];
  }
  return S.blocks;
}
window.getCurrentBlocks=getCurrentBlocks;

function selectSession(s) {
  S.currentSession=s; renderAll();
}
window.selectSession = selectSession;

function renderMain() {
  const m=document.getElementById('main');
  switch(S.currentView) {
    case 'session':  m.innerHTML=renderSession(); break;
    case 'progress': m.innerHTML=renderProgress(); break;
    case 'wellness': m.innerHTML=renderWellness(); break;
    case 'stats':    m.innerHTML=renderStats(); break;
    case 'teams':    m.innerHTML=renderTeams(); break;
    case 'settings': m.innerHTML=renderSettings(); break;
    case 'admin':    m.innerHTML=renderAdmin(); break;
    case 'evals':    m.innerHTML=renderEvals(); break;
    default:         m.innerHTML='';

  if(S.currentView==='evals') setTimeout(drawEvalCharts,50);

// ── EXERCISE SUMMARY FORMAT ────────────────────
function formatExSummary(ex) {
  const parts = [];
  // Volume: "3x8" or "3x" or "8"
  if(ex.series && ex.reps) parts.push(`${ex.series}x${ex.reps}`);
  else if(ex.series) parts.push(`${ex.series}x`);
  else if(ex.reps) parts.push(ex.reps);
  // Intensity: %RM or RPE/RIR
  if(ex.pct) parts.push(`${ex.pct}%RM`);
  else if(ex.rpe) {
    const type = ex.intensityType || 'RPE';
    parts.push(`${type} ${ex.rpe}`);
  }
  if(ex.note) parts.push(`(${ex.note})`);
  return parts.join(' // ');
}
window.formatExSummary=formatExSummary;

// ── SESSION ───────────────────────────────────────────────────
function renderSession() {
  const blocks = getCurrentBlocks();
  const sessionLabel = S.isAdmin ? `Sesión ${S.currentSession}` : (S.currentSession||'Sesión');
  const header = `<div class="page-header">
    <div class="page-title">${sessionLabel}</div>
    <div class="page-subtitle">Semana ${S.currentWeek} · ${new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div>
  </div>`;
  if (!blocks.length) {
    return header + `<div class="empty-state">Sin rutina asignada.<br><span style="font-size:12px">Tu entrenador va a asignarte una rutina pronto.</span></div>`;
  }
  return header + blocks.map(b=>renderBlock(b)).join('')
    + `<button class="finish-btn" onclick="finishSession()">✓ Marcar sesión como completada</button>`;
}

function renderBlock(b) {
  const cc=b.colorKey||'bx';
  const open=b._open!==false;
  const exampleColors = {b1:'var(--teal)',b2:'var(--blue)',b3:'var(--purple)',b4:'var(--amber)',bx:'var(--text2)'};
  let inner=`<p class="block-note">${b.note||''}</p>`;
  b.categories.forEach((cat,ci)=>{
    inner+=`<div class="cat-header">
      <div class="cat-label-wrap">
        <span class="cat-label" ondblclick="editCatLabel(this,'${b.id}',${ci})">${cat.label}</span>
        <input class="cat-label-inp" id="catinp-${b.id}-${ci}" onblur="saveCatLabel('${b.id}',${ci},this)" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      ${S.isAdmin?`<span class="cat-del" onclick="deleteCat('${b.id}',${ci})">− cat</span>`:''}
    </div>`;
    cat.exercises.forEach(ex=>{ inner+=renderExRow(ex,b.id,ci); });
    if(S.isAdmin) {
      inner+=`<button class="add-btn" onclick="openLib('${b.id}',${ci})">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Agregar ejercicio</button>`;
    }
    if(ci<b.categories.length-1) inner+=`<hr class="cat-divider">`;
  });
  if(S.isAdmin) {
    inner+=`<button class="add-btn" style="margin-top:10px;color:var(--text3);border-top:1px solid var(--border);padding-top:10px" onclick="addCategory('${b.id}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Agregar subcategoría</button>`;
  }
  if(b.hasRPE) {
    const sd=getSD(S.currentWeek,S.currentSession);
    const rpe=sd.rpe||7.5;
    inner+=`<div class="rpe-row">
      <span class="rpe-lbl">RPE objetivo:</span>
      <input type="range" class="rpe-slider" min="5" max="10" step="0.5" value="${rpe}" oninput="setRPE(this.value)">
      <span class="rpe-val" id="rpe-val">${rpe}</span>
      <span class="rpe-desc" id="rpe-desc">${rpeDesc(rpe)}</span>
    </div>`;
  }
  return `<div class="card block ${cc} ${open?'open':''}" id="block-${b.id}">
    <div class="block-header" onclick="toggleBlock('${b.id}')">
      <span class="block-badge">${b.label}</span>
      <div class="block-title-wrap">
        <span class="block-title" ${S.isAdmin?`ondblclick="editBlockTitle(event,'${b.id}')"`:''}>${b.title}</span>
        <input class="block-title-inp" id="btinp-${b.id}" onblur="saveBlockTitle('${b.id}',this)" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      <span class="block-time">${b.time}</span>
      ${S.isAdmin?`<span class="block-del" onclick="deleteBlock(event,'${b.id}')">×</span>`:''}
      <span class="block-chevron">›</span>
    </div>
    <div class="block-body">${inner}</div>
  </div>`;
}

function renderExRow(ex,blockId,catIdx,forceReadOnly=false) {
  const d=getED(S.currentWeek,S.currentSession,ex.id);
  const hasV=!!S.videos[ex.id];
  const canEdit=S.isAdmin && !forceReadOnly;
  const isAthleteMode=!S.isAdmin && !!S.assignedRoutine;
  // Routine prescription values (from routine definition or admin-set in exercise)
  const prescSeries = ex.series||'';
  const prescReps   = ex.reps||'';
  const prescPct    = ex.pct||'';
  const prescNote   = ex.note||'';
  // If athlete mode: show prescribed values as read-only, only allow editing load + rpe actual
  const vbtF=ex.vbt?`<div class="field-box"><span class="field-lbl">m/s</span>
    <input class="field-inp vbt" type="number" step="0.01" placeholder="0.00" value="${d.ms||''}"
      ${isAthleteMode?'readonly style="opacity:.5;pointer-events:none"':''}
      onchange="setField('${ex.id}','ms',this.value)"></div>`:'';
  // Prescription display for athlete (read-only pill row above fields)
  const prescRow = isAthleteMode && (prescSeries||prescReps||prescPct) ? `
    <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
      ${prescSeries?`<span style="font-size:11px;background:var(--purple-dim);color:var(--purple);padding:2px 8px;border-radius:20px;border:1px solid rgba(212,100,122,0.3)">${prescSeries} series</span>`:''}
      ${prescReps?`<span style="font-size:11px;background:var(--blue-dim);color:var(--blue);padding:2px 8px;border-radius:20px;border:1px solid rgba(96,165,250,0.3)">${prescReps} reps</span>`:''}
      ${prescPct?`<span style="font-size:11px;background:var(--teal-dim);color:var(--teal);padding:2px 8px;border-radius:20px;border:1px solid rgba(45,212,191,0.3)">${prescPct}%RM</span>`:''}
      ${prescNote?`<span style="font-size:11px;color:var(--text3);font-style:italic">${prescNote}</span>`:''}
    </div>` : '';
  return `<div class="ex-row" id="exrow-${ex.id}">
    <div class="ex-check ${d.checked?'checked':''}" onclick="toggleCheck('${ex.id}')"></div>
    <div class="ex-main">
      <div class="ex-name-row">
        <span class="ex-name" ${canEdit?`ondblclick="editExName(this,'${ex.id}','${blockId}',${catIdx})"`:''}>${ex.name}</span>
        <input class="ex-name-inp" id="exinp-${ex.id}" ${canEdit?`onblur="saveExName('${ex.id}','${blockId}',${catIdx},this)" onkeydown="if(event.key==='Enter')this.blur()"`:''}>
        <div class="ex-actions">
          <div class="ex-icon-btn ${hasV?'has-video':''}" onclick="openVideoModal('${ex.id}','${ex.name}')" title="Video">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          ${canEdit?`<div class="ex-icon-btn del-ex" onclick="deleteExercise('${ex.id}','${blockId}',${catIdx})" title="Eliminar">×</div>`:''}
        </div>
      </div>
      ${prescRow}
      <div class="ex-fields">
        ${isAthleteMode ? `
          <div class="field-box"><span class="field-lbl" style="color:var(--green)">Carga real (kg)</span>
            <input class="field-inp load" type="text" placeholder="—" value="${d.load||''}" onchange="setField('${ex.id}','load',this.value)" style="border-color:rgba(212,100,122,0.35)"></div>
          <div class="field-box"><span class="field-lbl" style="color:var(--amber)">RPE real</span>
            <input class="field-inp" type="text" placeholder="—" value="${d.rpe||''}" onchange="setField('${ex.id}','rpe',this.value)" style="border-color:rgba(251,191,36,0.4)"></div>
          ${vbtF}
        ` : `
          <div class="field-box"><span class="field-lbl">Series</span>
            <input class="field-inp" type="text" placeholder="3x" value="${d.series||''}" onchange="setField('${ex.id}','series',this.value)"></div>
          <div class="field-box"><span class="field-lbl">Reps</span>
            <input class="field-inp" type="text" placeholder="6–8" value="${d.reps||''}" onchange="setField('${ex.id}','reps',this.value)"></div>
          <div class="field-box"><span class="field-lbl">%RM</span>
            <input class="field-inp" type="text" placeholder="—" value="${d.pct||''}" onchange="setField('${ex.id}','pct',this.value)"></div>
          ${vbtF}
          <div class="field-box"><span class="field-lbl">Carga (kg)</span>
            <input class="field-inp load" type="text" placeholder="—" value="${d.load||''}" onchange="setField('${ex.id}','load',this.value)"></div>
          <div class="field-box"><span class="field-lbl">RPE</span>
            <input class="field-inp" type="text" placeholder="—" value="${d.rpe||''}" onchange="setField('${ex.id}','rpe',this.value)"></div>
        `}
      </div>
    </div>
  </div>`;
}

// ── SESSION ACTIONS ───────────────────────────────────────────
function toggleBlock(id) {
  const el=document.getElementById('block-'+id);
  el.classList.toggle('open');
  const blocks=getCurrentBlocks();
  const b=blocks.find(x=>x.id===id);
  if(b) b._open=el.classList.contains('open');
}
window.toggleBlock=toggleBlock;

function toggleCheck(exId) {
  const d=getED(S.currentWeek,S.currentSession,exId);
  d.checked=!d.checked;
  const el=document.querySelector(`#exrow-${exId} .ex-check`);
  if(el) el.classList.toggle('checked',d.checked);
  if(!getSD(S.currentWeek,S.currentSession).date)
    getSD(S.currentWeek,S.currentSession).date=new Date().toISOString().split('T')[0];
  scheduleSave();
}
window.toggleCheck=toggleCheck;

function setField(exId,field,val) {
  const d=getED(S.currentWeek,S.currentSession,exId);
  d[field]=val;
  if(!getSD(S.currentWeek,S.currentSession).date)
    getSD(S.currentWeek,S.currentSession).date=new Date().toISOString().split('T')[0];
  scheduleSave();
}
window.setField=setField;

function setRPE(val) {
  getSD(S.currentWeek,S.currentSession).rpe=parseFloat(val);
  const v=document.getElementById('rpe-val'), d=document.getElementById('rpe-desc');
  if(v) v.textContent=val; if(d) d.textContent=rpeDesc(val);
  scheduleSave();
}
window.setRPE=setRPE;

function finishSession() {
  const sd=getSD(S.currentWeek,S.currentSession);
  sd.done=true; sd.date=new Date().toISOString().split('T')[0];
  scheduleSave(); showToast(`✓ Día ${S.currentSession} completado`); renderSubnav();
}
window.finishSession=finishSession;

// ── ADMIN EDIT ACTIONS ────────────────────────────────────────
function editBlockTitle(e,blockId) {
  e.stopPropagation();
  const b=S.blocks.find(x=>x.id===blockId); if(!b) return;
  const span=e.target, inp=document.getElementById('btinp-'+blockId);
  span.style.display='none'; inp.value=b.title; inp.style.display='block'; inp.focus(); inp.select();
}
window.editBlockTitle=editBlockTitle;

function saveBlockTitle(blockId,inp) {
  const b=S.blocks.find(x=>x.id===blockId); if(!b) return;
  if(inp.value.trim()) b.title=inp.value.trim();
  inp.style.display='none';
  const span=inp.previousElementSibling; if(span) span.style.display='';
  span.textContent=b.title; scheduleSave();
}
window.saveBlockTitle=saveBlockTitle;

function deleteBlock(e,blockId) {
  e.stopPropagation();
  if(!confirm('¿Eliminar este bloque?')) return;
  S.blocks=S.blocks.filter(b=>b.id!==blockId);
  scheduleSave(); renderMain();
}
window.deleteBlock=deleteBlock;

function editCatLabel(el,blockId,catIdx) {
  const inp=document.getElementById(`catinp-${blockId}-${catIdx}`);
  el.style.display='none'; inp.value=el.textContent; inp.style.display='inline-block'; inp.focus(); inp.select();
}
window.editCatLabel=editCatLabel;

function saveCatLabel(blockId,catIdx,inp) {
  const b=S.blocks.find(x=>x.id===blockId); if(!b) return;
  if(inp.value.trim()) b.categories[catIdx].label=inp.value.trim();
  inp.style.display='none';
  const span=inp.previousElementSibling; if(span) { span.textContent=b.categories[catIdx].label; span.style.display=''; }
  scheduleSave();
}
window.saveCatLabel=saveCatLabel;

function deleteCat(blockId,catIdx) {
  if(!confirm('¿Eliminar esta subcategoría y sus ejercicios?')) return;
  const b=S.blocks.find(x=>x.id===blockId); if(!b) return;
  b.categories.splice(catIdx,1); scheduleSave(); renderMain();
}
window.deleteCat=deleteCat;

function addCategory(blockId) {
  const b=S.blocks.find(x=>x.id===blockId); if(!b) return;
  b.categories.push({id:genId(),label:'Nueva categoría',exercises:[]});
  scheduleSave(); renderMain();
}
window.addCategory=addCategory;

function editExName(el,exId,blockId,catIdx) {
  const inp=document.getElementById('exinp-'+exId);
  el.style.display='none'; inp.value=el.textContent; inp.style.display='block'; inp.focus(); inp.select();
}
window.editExName=editExName;

function saveExName(exId,blockId,catIdx,inp) {
  const b=S.blocks.find(x=>x.id===blockId); if(!b) return;
  const ex=b.categories[catIdx].exercises.find(e=>e.id===exId); if(!ex) return;
  if(inp.value.trim()) ex.name=inp.value.trim();
  inp.style.display='none';
  const span=inp.previousElementSibling; if(span) { span.textContent=ex.name; span.style.display=''; }
  scheduleSave();
}
window.saveExName=saveExName;

function deleteExercise(exId,blockId,catIdx) {
  const b=S.blocks.find(x=>x.id===blockId); if(!b) return;
  b.categories[catIdx].exercises=b.categories[catIdx].exercises.filter(e=>e.id!==exId);
  scheduleSave(); renderMain();
}
window.deleteExercise=deleteExercise;

// ── ADD BLOCK ─────────────────────────────────────────────────
function addBlock() {
  const colors=['b1','b2','b3','b4','bx'];
  const cc=colors[S.blocks.length % colors.length];
  S.blocks.push({
    id:genId(), label:`Bloque ${S.blocks.length+1}`, title:'Nuevo bloque',
    time:'', colorKey:cc, note:'', _open:true, categories:[
      {id:genId(),label:'Categoría',exercises:[]}
    ]
  });
  scheduleSave(); renderMain();
  setTimeout(()=>{
    const last=document.querySelectorAll('.block-title');
    if(last.length) last[last.length-1].dispatchEvent(new MouseEvent('dblclick',{bubbles:true}));
  },100);
}
window.addBlock=addBlock;

// ── LIBRARY ───────────────────────────────────────────────────
function openLib(blockId,catIdx) {
  S.libTarget={blockId,catIdx};
  S.activeFilter=null;
  document.getElementById('lib-search').value='';
  renderLibFilters();
  renderLibList();
  document.getElementById('lib-overlay').classList.add('open');
}
window.openLib=openLib;

function closeLib() { document.getElementById('lib-overlay').classList.remove('open'); }
window.closeLib=closeLib;

function closeLibIfOutside(e) { if(e.target===document.getElementById('lib-overlay')) closeLib(); }
window.closeLibIfOutside=closeLibIfOutside;

function renderLibFilters() {
  const f=document.getElementById('lib-filters');
  f.innerHTML=[{id:null,label:'Todos'},...ALL_FILTERS.map(t=>({id:t,label:t}))].map(ft=>
    `<span class="filter-chip ${S.activeFilter===ft.id?'active':''}" onclick="setFilter('${ft.id}')">${ft.label}</span>`
  ).join('');
}

function setFilter(f) {
  S.activeFilter=f==='null'?null:f;
  renderLibFilters(); renderLibList();
}
window.setFilter=setFilter;

function renderLibList() {
  const q=document.getElementById('lib-search').value.toLowerCase();
  const list=document.getElementById('lib-list');
  let items=S.library.filter(ex=>{
    const matchQ=!q||ex.name.toLowerCase().includes(q);
    const matchF=!S.activeFilter||ex.tags?.includes(S.activeFilter);
    return matchQ&&matchF;
  });
  if(!items.length) { list.innerHTML=`<div class="empty-state">No se encontraron ejercicios</div>`; return; }
  list.innerHTML=items.map(ex=>`
    <div class="lib-item" onclick="addFromLib('${ex.id}')">
      <span class="lib-name">${ex.name}</span>
      <div class="lib-tags">${(ex.tags||[]).slice(0,2).map(t=>`<span class="lib-tag">${t}</span>`).join('')}</div>
      <span class="lib-add-icon">+</span>
    </div>`).join('');
}
window.renderLibList=renderLibList;

function addFromLib(libId) {
  const libEx=S.library.find(e=>e.id===libId); if(!libEx||!S.libTarget) return;
  const {blockId,catIdx,sessionName,isRoutine}=S.libTarget;
  if(S.libTarget.isTD) {
    // Adding to team day editor
    const {teamId,dayIdx}=S.libTarget;
    const b=getTDBlock(blockId,teamId,dayIdx);
    if(!b)return;
    b.categories[catIdx].exercises.push({id:genId(),name:libEx.name,series:'',reps:'',pct:'',rpe:'',note:''});
    closeLib();renderMain();
  } else if(isRoutine && S.editingRoutine) {
    // Adding to routine editor
    const b=(S.editingRoutine.sessions[sessionName]||[]).find(x=>x.id===blockId);
    if(!b) return;
    const newEx={id:genId(),name:libEx.name,series:'',reps:'',pct:'',rpe:'',note:''};
    b.categories[catIdx].exercises.push(newEx);
    closeLib(); renderMain();
  } else {
    // Adding to admin's personal session
    const b=S.blocks.find(x=>x.id===blockId); if(!b) return;
    const newEx={id:genId(),name:libEx.name};
    b.categories[catIdx].exercises.push(newEx);
    scheduleSave(); closeLib(); renderMain();
  }
  showToast(`✓ ${libEx.name} agregado`);
}
window.addFromLib=addFromLib;

function createAndAddExercise() {
  const name=document.getElementById('lib-new-name').value.trim();
  if(!name) return;
  const newLibEx={id:genId(),name,tags:[]};
  S.library.push(newLibEx);
  if(S.libTarget) {
    const {blockId,catIdx,sessionName,isRoutine}=S.libTarget;
    if(isRoutine && S.editingRoutine) {
      const b=(S.editingRoutine.sessions[sessionName]||[]).find(x=>x.id===blockId);
      if(b) b.categories[catIdx].exercises.push({id:genId(),name,series:'',reps:'',pct:'',rpe:'',note:''});
      closeLib(); renderMain();
    } else {
      const b=S.blocks.find(x=>x.id===blockId);
      if(b) b.categories[catIdx].exercises.push({id:genId(),name});
      scheduleSave(); closeLib(); renderMain();
    }
  }
  document.getElementById('lib-new-name').value='';
  showToast(`✓ Ejercicio creado`);
}
window.createAndAddExercise=createAndAddExercise;

// ── WELLNESS ──────────────────────────────────────────────────
function renderWellness() {
  const today=new Date().toISOString().split('T')[0];
  const wKey=today;
  if(!S.wellness[wKey]) S.wellness[wKey]={};
  const w=S.wellness[wKey];

  let hooperScore=0; let allFilled=true;
  HOOPER_ITEMS.forEach(item=>{ if(w[item.key]) hooperScore+=w[item.key]; else allFilled=false; });

  const stateLabel = allFilled
    ? (hooperScore<=16?'En buena forma 💪':hooperScore<=24?'Normal ✓':'Fatigado 😴')
    : 'Completá todos los ítems';
  const stateColor = allFilled
    ? (hooperScore<=16?'var(--green)':hooperScore<=24?'var(--amber)':'var(--red)')
    : 'var(--text3)';

  const isDesktop = window.innerWidth >= 900;

  // Desktop: two-column layout. Mobile: stacked.
  let html = `<div class="page-header">
    <div class="page-title">Wellness</div>
    <div class="page-subtitle">${today} · Hooper Index</div>
  </div>`;

  if(isDesktop) {
    // Desktop: Hooper left, body map right
    html += `<div style="display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start">
      <div>`;
  }

  // Hooper card
  html += `<div class="wellness-card">
    <div class="wellness-title">Hooper Index</div>
    <div class="wellness-sub">1 = muy bien · 7 = muy mal</div>`;

  HOOPER_ITEMS.forEach(item=>{
    const val=w[item.key]||0;
    const btns=Array.from({length:7},(_,i)=>{
      const v=i+1;
      const pct = Math.round((v/7)*100);
      const bg = val===v ? `hsl(${120-pct},70%,45%)` : '';
      return `<button class="hooper-btn ${val===v?'sel':''}" style="${val===v?`background:${bg};border-color:${bg}`:''}" onclick="setHooper('${wKey}','${item.key}',${v})">${v}</button>`;
    }).join('');
    html+=`<div class="hooper-item">
      <div class="hooper-label">
        <span>${item.label}</span>
        <span style="color:${val?`hsl(${Math.round((1-val/7)*120)},60%,50%)`:'var(--text3)'}">${val||'—'}</span>
      </div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:5px;display:flex;justify-content:space-between"><span>${item.lo}</span><span>${item.hi}</span></div>
      <div class="hooper-scale">${btns}</div>
    </div>`;
  });

  html+=`<div class="hooper-result">
    <div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Score total</div>
      <div class="hooper-score" style="color:${stateColor}">${allFilled?hooperScore:'—'}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">≤16 bien · ≤24 normal · >24 fatigado</div>
    </div>
    <div style="text-align:right">
      <div class="hooper-state" style="color:${stateColor}">${stateLabel}</div>
    </div>
  </div>
  ${allFilled?`<button class="wellness-submit" onclick="submitWellness('${wKey}')">Guardar registro de hoy</button>`:''}
  </div>`;

  if(isDesktop) {
    html += `</div><div>`; // close left col, open right col
  }

  // Body map card — fixed size, never full width
  html+=`<div class="wellness-card">
    <div class="wellness-title">Mapa de molestias</div>
    <div class="wellness-sub">Tocá la zona donde sentís molestia</div>
    <div class="body-map-wrap">
      <div class="body-svg-wrap">
        ${renderBodySVG('front')}
        <div class="body-svg-label">Frente</div>
      </div>
      <div class="body-svg-wrap">
        ${renderBodySVG('back')}
        <div class="body-svg-label">Espalda</div>
      </div>
    </div>
    ${S.selectedZone ? renderZoneDetail() : ''}
    ${renderInjuryList()}
  </div>`;

  if(isDesktop) {
    html += `</div></div>`; // close right col + grid
  }

  return html;
}

function renderBodySVG(side) {
  const zones=BODY_ZONES[side];
  const shapes=zones.map(z=>{
    const inj=S.injuries[z.id];
    let cls='body-zone';
    if(inj) { const p=inj.pain; cls+=p>=8?' sel-high':p>=4?' sel-med':' sel-low'; }
    const click=`onclick="selectZone('${z.id}')"`;
    const tip=`<title>${z.label}</title>`;
    if(z.type==='circle') {
      return `<circle class="${cls}" cx="${z.cx}" cy="${z.cy}" r="${z.r}" ${click}>${tip}</circle>`;
    } else {
      return `<ellipse class="${cls}" cx="${z.cx}" cy="${z.cy}" rx="${z.rx}" ry="${z.ry}" ${click}>${tip}</ellipse>`;
    }
  }).join('');
  return `<svg viewBox="0 0 200 335" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:320px">${shapes}</svg>`;
}

function renderZoneDetail() {
  const zid=S.selectedZone;
  const allZones=[...BODY_ZONES.front,...BODY_ZONES.back];
  const zone=allZones.find(z=>z.id===zid); if(!zone) return '';
  const inj=S.injuries[zid]||{pain:0,note:'',date:''};
  const painBtns=Array.from({length:11},(_,i)=>{
    const cls=inj.pain===i?(i>=8?'pain-btn p-high':i>=4?'pain-btn p-med':'pain-btn p-low'):'pain-btn';
    return `<button class="${cls}" onclick="setPain('${zid}',${i})">${i}</button>`;
  }).join('');
  return `<div class="zone-detail">
    <div class="zone-detail-title">${zone.label}
      <span class="zone-close" onclick="S.selectedZone=null;renderMain()">×</span>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Dolor 0–10</div>
    <div class="pain-scale">${painBtns}</div>
    <textarea class="pain-note-inp" placeholder="Observaciones..." onchange="setPainNote('${zid}',this.value)">${inj.note||''}</textarea>
    <button class="wellness-submit" onclick="saveInjury('${zid}')">Guardar molestia</button>
  </div>`;
}

function renderInjuryList() {
  const allZones=[...BODY_ZONES.front,...BODY_ZONES.back];
  const active=Object.entries(S.injuries).filter(([,v])=>v.pain>0);
  if(!active.length) return `<div style="font-size:12px;color:var(--text3);text-align:center;padding:12px">Sin molestias registradas</div>`;
  return `<div class="injury-list">${active.map(([id,inj])=>{
    const zone=allZones.find(z=>z.id===id);
    const col=inj.pain>=8?'var(--red)':inj.pain>=4?'var(--amber)':'var(--green)';
    const lbl=inj.pain>=8?'Dolor':inj.pain>=4?'Molestia':'Leve';
    const hist=inj.history||[];
    const trend=hist.length>1?(hist[hist.length-1].pain<hist[hist.length-2].pain?'↓ Mejorando':hist[hist.length-1].pain>hist[hist.length-2].pain?'↑ Empeorando':'→ Estable'):'';
    return `<div class="injury-item">
      <div class="injury-dot" style="background:${col}"></div>
      <div class="injury-info">
        <div class="injury-zone">${zone?.label||id}</div>
        <div class="injury-pain">Dolor: ${inj.pain}/10 · ${lbl}${inj.note?' · '+inj.note.slice(0,30):''}</div>
      </div>
      <div class="injury-trend" style="color:${col}">${trend}</div>
    </div>`;
  }).join('')}</div>`;
}

function setHooper(wKey,key,val) {
  if(!S.wellness[wKey]) S.wellness[wKey]={};
  S.wellness[wKey][key]=val; scheduleSave(); renderMain();
}
window.setHooper=setHooper;

function submitWellness(wKey) {
  S.wellness[wKey].date=wKey; S.wellness[wKey].submitted=true;
  scheduleSave(); showToast('✓ Wellness registrado'); renderMain();
}
window.submitWellness=submitWellness;

function selectZone(zid) { S.selectedZone=zid; renderMain(); }
window.selectZone=selectZone;

function setPain(zid,val) {
  if(!S.injuries[zid]) S.injuries[zid]={pain:0,note:'',history:[]};
  S.injuries[zid].pain=val; renderMain();
}
window.setPain=setPain;

function setPainNote(zid,val) {
  if(!S.injuries[zid]) S.injuries[zid]={pain:0,note:'',history:[]};
  S.injuries[zid].note=val;
}
window.setPainNote=setPainNote;

function saveInjury(zid) {
  const inj=S.injuries[zid]; if(!inj) return;
  if(!inj.history) inj.history=[];
  inj.history.push({date:new Date().toISOString().split('T')[0],pain:inj.pain,note:inj.note||''});

  S.selectedZone=null; scheduleSave(); showToast('✓ Molestia guardada'); renderMain();

// ── PROGRESS ──────────────────────────────────────────────────
function renderProgress() {
  let w=S.progressView.week||S.currentWeek;
  w=Math.max(1,Math.min(w,S.currentWeek));
  S.progressView.week=w;

  let html=`<div class="week-nav">
    <button class="week-nav-btn" onclick="progWeek(-1)" ${w<=1?'disabled':''}>‹</button>
    <div class="week-nav-label">Semana ${w} · <span style="color:var(--text3);font-size:12px">${weekLabel(w)}</span></div>
    <button class="week-nav-btn" onclick="progWeek(1)" ${w>=S.currentWeek?'disabled':''}>›</button>
  </div>`;

  html+=`<div class="prog-week-card">
    <div class="prog-week-header"><span class="prog-week-title">Sesiones</span><span class="prog-week-date">${weekLabel(w)}</span></div>
    <div class="session-dots">${getSessionList().map(s=>`<div class="session-dot ${getSD(w,s).done?'done':''}" title="${s}"></div>`).join('')}</div>
  </div>`;

  const sessionList=getSessionList();
  const allExById={};
  getCurrentBlocks().forEach(b=>b.categories.forEach(c=>c.exercises.forEach(e=>{allExById[e.id]=e.name;})));
  const exData=[];
  getCurrentBlocks().forEach(b=>b.categories.forEach(c=>c.exercises.forEach(ex=>{
    const rows=sessionList.map(s=>({s,d:getED(w,s,ex.id),done:getSD(w,s).done}))
      .filter(r=>r.done&&(r.d.series||r.d.reps||r.d.load||r.d.ms));
    if(rows.length) exData.push({ex,rows});
  })));

  if(!exData.length) {
    html+=`<div class="empty-state">Sin datos registrados para esta semana.<br><span style="font-size:12px">Completá sesiones para ver progresión.</span></div>`;
  } else {
    html+=`<div class="prog-ex-list">`;
    exData.forEach(({ex,rows})=>{
      rows.forEach(r=>{
        const d=r.d;
        const serReps=[d.series,d.reps].filter(Boolean).join('×')||'—';
        const carga=d.load?`${d.load}kg`:d.pct?`${d.pct}%RM`:d.ms?`${d.ms}m/s`:'—';
        html+=`<div class="prog-ex-item">
          <span class="prog-ex-name">${ex.name}</span>
          <div class="prog-ex-vals">
            <div class="prog-val"><b>${serReps}</b><span>vol</span></div>
            <div class="prog-val"><b>${carga}</b><span>carga</span></div>
            <div class="prog-val"><b>Día ${r.s}</b><span></span></div>
          </div>
        </div>`;
      });
    });
    html+=`</div>`;
  }

  if(w>1) {
    const c=countChecked(w), p=countChecked(w-1), diff=c-p;
    html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:10px;font-size:13px;color:var(--text2)">
      vs semana ${w-1}: <b style="color:var(--purple)">${c}</b> ejercicios realizados
      ${diff>0?`<span style="color:var(--green)"> +${diff} ↑</span>`:diff<0?`<span style="color:var(--red)"> ${diff} ↓</span>`:'<span style="color:var(--text3)"> sin cambios</span>'}
    </div>`;
  }
  return html;
}

function progWeek(d) { S.progressView.week=(S.progressView.week||S.currentWeek)+d; renderMain(); }
window.progWeek=progWeek;

// ── STATS ─────────────────────────────────────────────────────
function renderStats() {
  const sessionList=getSessionList();
  let totalS=0,totalC=0;
  const freq={};
  for(let w=1;w<=S.currentWeek;w++) sessionList.forEach(s=>{
    const sd=getSD(w,s);
    if(sd.done) totalS++;
    Object.entries(sd.exercises).forEach(([id,d])=>{ if(d.checked){totalC++;freq[id]=(freq[id]||0)+1;} });
  });

  const today=new Date();
  const last7=Array.from({length:7},(_,i)=>{ const d=new Date(today); d.setDate(d.getDate()-6+i); return d.toISOString().split('T')[0]; });
  const doneDs=new Set();
  for(let w=1;w<=S.currentWeek;w++) sessionList.forEach(s=>{
    const sd=getSD(w,s); if(sd.done&&sd.date) doneDs.add(sd.date);
  });

  const allExById={};
  getCurrentBlocks().forEach(b=>b.categories.forEach(c=>c.exercises.forEach(e=>{allExById[e.id]=e.name;})));
  const topEx=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxF=topEx[0]?.[1]||1;

  // Wellness trend
  const wDays=Object.entries(S.wellness).sort((a,b)=>a[0].localeCompare(b[0])).slice(-7);
  const wScores=wDays.map(([d,w])=>{
    const s=HOOPER_ITEMS.reduce((acc,i)=>acc+(w[i.key]||0),0);
    return {d,s,allFilled:HOOPER_ITEMS.every(i=>w[i.key])};
  }).filter(x=>x.allFilled);

  return `
  <div class="stat-grid">
    <div class="stat-item"><div class="stat-val">${S.currentWeek}</div><div class="stat-lbl">Semanas</div></div>
    <div class="stat-item"><div class="stat-val">${totalS}</div><div class="stat-lbl">Sesiones</div></div>
    <div class="stat-item"><div class="stat-val">${totalC}</div><div class="stat-lbl">Ejercicios</div></div>
    <div class="stat-item"><div class="stat-val">${totalS>0?Math.round(totalC/totalS):0}</div><div class="stat-lbl">Ejerc./sesión</div></div>
  </div>
  <div class="chart-section">
    <div class="chart-title">Últimos 7 días</div>
    <div class="streak-row">${last7.map(d=>{
      const day=new Date(d+'T12:00:00').toLocaleDateString('es-AR',{weekday:'short'}).slice(0,2);
      return `<div class="streak-dot ${doneDs.has(d)?'done':''}">${day}</div>`;
    }).join('')}</div>
  </div>
  ${topEx.length?`<div class="chart-section">
    <div class="chart-title">Ejercicios más frecuentes</div>
    <div class="chart-rows">${topEx.map(([id,f])=>`
      <div class="chart-row">
        <span class="chart-lbl">${allExById[id]||'—'}</span>
        <div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${Math.round(f/maxF*100)}%"></div></div>
        <span class="chart-val">${f}x</span>
      </div>`).join('')}</div>
  </div>`:''}
  ${wScores.length?`<div class="chart-section">
    <div class="chart-title">Tendencia Hooper (últimos ${wScores.length} días)</div>
    <div class="chart-rows">${wScores.map(({d,s})=>{
      const col=s<=16?'var(--green)':s<=24?'var(--amber)':'var(--red)';
      return `<div class="chart-row">
        <span class="chart-lbl">${d.slice(5)}</span>
        <div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${Math.round(s/42*100)}%;background:${col}"></div></div>
        <span class="chart-val" style="color:${col}">${s}</span>
      </div>`;
    }).join('')}</div>
  </div>`:''}`;
}

      if(!blocks.length){
        html+=`<div class="empty-state" style="margin-bottom:10px">Sin ejercicios aún.<br><span style="font-size:12px">Tocá "Editar" para planificar esta sesión.</span></div>`;
      } else {
        html+=blocks.map(b=>{
          const exList=b.categories.flatMap(c=>c.exercises);
          return `<div class="card" style="padding:12px;margin-bottom:8px">
            <div style="font-size:12px;font-weight:600;color:var(--purple);margin-bottom:6px">${b.label} — ${b.title}</div>
            ${exList.map(ex=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
              <span>${ex.name}</span>
              <span style="color:var(--text3);font-size:11px">${formatExSummary(ex)}</span>
            </div>`).join('')}
          </div>`;
        }).join('');
      }
      html+=`<div style="font-size:11px;color:var(--text3);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.06em">Notas por jugador</div>
        <div class="player-note"><span class="player-note-name">+ Nota</span>
          <input style="flex:1;background:transparent;border:none;outline:none;font-size:12px;color:var(--text)" placeholder="Jugador: nota específica..." onkeydown="if(event.key==='Enter')addPlayerNote('${team.id}',${di},this)">
        </div>
        ${(day.playerNotes||[]).map((n,ni)=>`<div class="player-note"><span class="player-note-name">${n.player}</span><span class="player-note-text">${n.note}</span><span style="cursor:pointer;color:var(--text3);font-size:14px;margin-left:8px" onclick="deletePlayerNote('${team.id}',${di},${ni})">×</span></div>`).join('')}`;
    }
  } else {
    html+=`<div class="empty-state">Sin sesiones de entrenamiento aún.<br><span style="font-size:12px">Agregá una sesión para comenzar a planificar.</span></div>`;
  }

  html+=`<button class="add-block-btn" style="margin-top:10px" onclick="addTrainingDay('${team.id}')">+ Agregar sesión</button>`;
  html+=`<div class="admin-section" style="margin-top:16px"><div class="admin-section-title">Jugadores</div>
    ${(team.players||[]).map((p,pi)=>`<div class="admin-item"><div class="admin-item-lbl">${p}</div><button class="abtn abtn-d" onclick="deletePlayer('${team.id}',${pi})">−</button></div>`).join('')}
    <div class="admin-item">
      <input id="new-player-inp" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rxs);padding:6px 10px;color:var(--text);font-size:13px;outline:none" placeholder="Nombre del jugador">
      <button class="abtn abtn-p" onclick="addPlayer('${team.id}')">Agregar</button>
    </div></div>
  <button class="abtn abtn-d" style="width:100%;margin-top:8px;padding:10px;border-radius:var(--r)" onclick="deleteTeam('${team.id}')">Eliminar equipo</button>`;
  return html;
}

function getTeamDay(teamId,dayIdx){const team=S.teams.find(t=>t.id===teamId);if(!team)return null;if(!team.trainingDays[dayIdx])return null;if(!team.trainingDays[dayIdx].blocks)team.trainingDays[dayIdx].blocks=[];return team.trainingDays[dayIdx];}

function renderTeamDayEditor(team,{teamId,dayIdx}){
  const day=getTeamDay(teamId,dayIdx);
