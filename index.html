<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Training System</title>
<style>
:root {
  --bg:#0f0f0f; --bg2:#181818; --bg3:#222; --bg4:#2a2a2a;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#f0f0f0; --text2:#999; --text3:#555;
  --purple:#8b7cf8; --purple-dim:rgba(139,124,248,0.13); --purple-dim2:rgba(139,124,248,0.07);
  --teal:#2dd4bf; --teal-dim:rgba(45,212,191,0.12);
  --blue:#60a5fa; --blue-dim:rgba(96,165,250,0.12);
  --amber:#fbbf24; --amber-dim:rgba(251,191,36,0.12);
  --red:#f87171; --red-dim:rgba(248,113,113,0.12);
  --green:#4ade80; --green-dim:rgba(74,222,128,0.12);
  --r:12px; --rsm:8px; --rxs:5px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;overflow:hidden}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0}
#subnav{flex-shrink:0;display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
#subnav::-webkit-scrollbar{display:none}
#main{flex:1;overflow-y:auto;padding:14px 16px 90px}
#bottombar{display:flex;background:var(--bg2);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:100}

/* TOPBAR */
.app-logo{font-size:15px;font-weight:700;letter-spacing:-0.02em;color:var(--text)}
.app-logo span{color:var(--purple)}
.topbar-right{display:flex;align-items:center;gap:8px}
.week-pill{font-size:12px;background:var(--purple-dim);color:var(--purple);padding:4px 10px;border-radius:20px;border:1px solid rgba(139,124,248,0.25)}
.avatar-btn{width:30px;height:30px;border-radius:50%;background:var(--purple-dim);border:1px solid rgba(139,124,248,0.3);color:var(--purple);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* SUBNAV */
.snav-tab{flex-shrink:0;font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.snav-tab.active{background:var(--purple-dim);color:var(--purple);border-color:rgba(139,124,248,0.3)}
.snav-tab.done{border-color:rgba(74,222,128,0.3);color:var(--green)}

/* BOTTOM BAR */
.bb-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0 14px;cursor:pointer;color:var(--text3);border:none;background:none;font-size:10px;letter-spacing:.04em;transition:color .15s}
.bb-btn svg{width:21px;height:21px}
.bb-btn.active{color:var(--purple)}

/* CARDS & BLOCKS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.block-header{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none}
.block-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.05em;white-space:nowrap}
.b1 .block-badge{background:var(--teal-dim);color:var(--teal)}
.b2 .block-badge{background:var(--blue-dim);color:var(--blue)}
.b3 .block-badge{background:var(--purple-dim);color:var(--purple)}
.b4 .block-badge{background:var(--amber-dim);color:var(--amber)}
.bx .block-badge{background:var(--bg3);color:var(--text2)}
.block-title-wrap{flex:1;min-width:0}
.block-title{font-size:14px;font-weight:500;cursor:text;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.block-title-inp{font-size:14px;font-weight:500;background:var(--bg3);border:1px solid var(--purple);border-radius:var(--rxs);padding:2px 6px;width:100%;color:var(--text);outline:none;display:none}
.block-time{font-size:11px;color:var(--text3);white-space:nowrap}
.block-chevron{color:var(--text3);font-size:18px;transition:transform .2s;flex-shrink:0}
.block.open .block-chevron{transform:rotate(90deg)}
.block-body{display:none;padding:0 14px 14px}
.block.open .block-body{display:block}
.block-note{font-size:12px;color:var(--text3);font-style:italic;margin-bottom:12px;padding:8px 10px;background:var(--bg3);border-radius:var(--rxs);border-left:2px solid var(--border2)}

/* DELETE BLOCK BTN */
.block-del{width:22px;height:22px;border-radius:50%;background:var(--red-dim);border:1px solid rgba(248,113,113,0.2);color:var(--red);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0.6}
.block-del:hover{opacity:1}

/* CATEGORY */
.cat-header{display:flex;align-items:center;justify-content:space-between;margin:14px 0 6px}
.cat-header:first-of-type{margin-top:0}
.cat-label-wrap{display:flex;align-items:center;gap:6px}
.cat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;cursor:text}
.cat-label-inp{font-size:10px;font-weight:600;background:var(--bg3);border:1px solid var(--purple);border-radius:3px;padding:1px 5px;color:var(--text2);outline:none;display:none;letter-spacing:.08em;text-transform:uppercase}
.cat-del{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:3px;border:1px solid var(--border)}
.cat-del:hover{color:var(--red);border-color:rgba(248,113,113,0.3)}
.cat-divider{border:none;border-top:1px solid var(--border);margin:10px 0}

/* EXERCISE ROW */
.ex-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.ex-row:last-of-type{border-bottom:none}
.ex-check{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ex-check.checked{background:var(--purple);border-color:var(--purple)}
.ex-check.checked::after{content:'✓';font-size:12px;color:#fff;font-weight:700}
.ex-main{flex:1;min-width:0}
.ex-name-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.ex-name{font-size:14px;color:var(--text);cursor:pointer;flex:1;min-width:0;word-break:break-word}
.ex-name-inp{font-size:14px;color:var(--text);background:var(--bg3);border:1px solid var(--purple);border-radius:var(--rxs);padding:3px 6px;width:100%;outline:none;display:none}
.ex-actions{display:flex;gap:4px;flex-shrink:0}
.ex-icon-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rxs);cursor:pointer;color:var(--text3);font-size:11px;transition:all .15s;flex-shrink:0}
.ex-icon-btn.has-video{background:rgba(255,0,0,0.08);border-color:rgba(255,60,60,0.25);color:#ff6b6b}
.ex-icon-btn.del-ex{color:var(--text3)}
.ex-icon-btn.del-ex:hover{background:var(--red-dim);border-color:rgba(248,113,113,0.3);color:var(--red)}
.ex-fields{display:flex;gap:5px;flex-wrap:wrap}
.field-box{display:flex;flex-direction:column;gap:2px}
.field-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.field-inp{font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rxs);padding:5px 6px;color:var(--text);width:58px;text-align:center;outline:none;transition:border-color .15s}
.field-inp:focus{border-color:var(--purple)}
.field-inp.vbt{border-color:rgba(96,165,250,0.35);background:rgba(96,165,250,0.05);color:var(--blue);width:62px}
.field-inp.vbt:focus{border-color:var(--blue)}
.field-inp.load{width:70px}

/* ADD BTNS */
.add-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;padding:8px 2px 0;background:none;border:none;width:100%}
.add-btn:hover{color:var(--text2)}
.add-block-btn{width:100%;padding:12px;background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--r);color:var(--text3);font-size:13px;cursor:pointer;margin-bottom:10px;transition:all .15s}
.add-block-btn:hover{border-color:var(--purple);color:var(--purple)}

/* RPE SLIDER */
.rpe-row{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.rpe-lbl{font-size:12px;color:var(--text2);white-space:nowrap}
.rpe-slider{flex:1;accent-color:var(--purple)}
.rpe-val{font-size:14px;font-weight:600;color:var(--purple);min-width:28px;text-align:center}
.rpe-desc{font-size:11px;color:var(--text3);min-width:80px}

/* FINISH BTN */
.finish-btn{width:100%;padding:14px;background:var(--purple);border:none;border-radius:var(--r);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;transition:opacity .15s}
.finish-btn:active{opacity:.85}

/* LIBRARY MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column}
.sheet-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sheet-title{font-size:15px;font-weight:600;margin-bottom:10px}
.sheet-search{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);padding:9px 12px;color:var(--text);font-size:14px;outline:none;margin-bottom:8px}
.sheet-search:focus{border-color:var(--purple)}
.filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.filter-chip.active{background:var(--purple-dim);color:var(--purple);border-color:rgba(139,124,248,0.3)}
.sheet-list{flex:1;overflow-y:auto;padding:8px 16px}
.lib-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.lib-item:last-child{border-bottom:none}
.lib-item:hover .lib-name{color:var(--purple)}
.lib-name{font-size:14px;color:var(--text);flex:1}
.lib-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.lib-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.lib-add-icon{color:var(--purple);font-size:18px;margin-left:8px;flex-shrink:0}
.sheet-new{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.sheet-new-row{display:flex;gap:8px}
.sheet-inp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rxs);padding:9px 12px;color:var(--text);font-size:13px;outline:none}
.sheet-inp:focus{border-color:var(--purple)}
.sheet-btn{padding:9px 14px;border-radius:var(--rxs);border:none;font-size:13px;font-weight:500;cursor:pointer}
.sheet-btn-p{background:var(--purple);color:#fff}
.sheet-btn-s{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* VIDEO MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:500px;padding:20px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:14px}
.modal-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rxs);padding:10px 12px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px}
.modal-inp:focus{border-color:var(--purple)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.mbtn{padding:9px 16px;border-radius:var(--rxs);border:none;cursor:pointer;font-size:13px;font-weight:500}
.mbtn-p{background:var(--purple);color:#fff}
.mbtn-s{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.mbtn-d{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,0.3)}

/* AUTH */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;padding:24px}
.auth-box{width:100%;max-width:360px}
.auth-logo{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.auth-logo span{color:var(--purple)}
.auth-sub{font-size:14px;color:var(--text3);margin-bottom:28px}
.auth-inp{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rsm);padding:12px 14px;color:var(--text);font-size:15px;outline:none;margin-bottom:10px}
.auth-inp:focus{border-color:var(--purple)}
.auth-btn{width:100%;padding:13px;background:var(--purple);border:none;border-radius:var(--rsm);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity .15s}
.auth-btn:active{opacity:.85}
.auth-err{font-size:13px;color:var(--red);margin-top:8px;min-height:18px}
.auth-switch{font-size:13px;color:var(--text3);margin-top:16px;text-align:center;cursor:pointer}
.auth-switch span{color:var(--purple)}

/* WELLNESS */
.wellness-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.wellness-title{font-size:14px;font-weight:600;margin-bottom:4px}
.wellness-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.hooper-item{margin-bottom:16px}
.hooper-label{font-size:13px;color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between}
.hooper-label span{color:var(--purple);font-weight:600}
.hooper-scale{display:flex;gap:4px}
.hooper-btn{flex:1;height:36px;border-radius:var(--rxs);border:1px solid var(--border);background:var(--bg3);color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.hooper-btn.sel{background:var(--purple-dim);border-color:rgba(139,124,248,0.4);color:var(--purple)}
.hooper-result{background:var(--bg3);border-radius:var(--rsm);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.hooper-score{font-size:26px;font-weight:700;color:var(--purple)}
.hooper-state{font-size:13px;color:var(--text2);text-align:right}
.wellness-submit{width:100%;padding:12px;background:var(--purple);border:none;border-radius:var(--rsm);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}

/* BODY MAP */
.body-map-wrap{display:flex;gap:12px;justify-content:center;margin-bottom:16px}
.body-svg-wrap{position:relative;flex:1;max-width:160px}
.body-svg-label{font-size:11px;color:var(--text3);text-align:center;margin-top:6px;font-weight:500}
.body-zone{cursor:pointer;transition:all .2s;fill:var(--bg3);stroke:var(--border2);stroke-width:1}
.body-zone:hover{fill:rgba(139,124,248,0.2);stroke:var(--purple)}
.body-zone.sel-low{fill:rgba(74,222,128,0.25);stroke:var(--green)}
.body-zone.sel-med{fill:rgba(251,191,36,0.3);stroke:var(--amber)}
.body-zone.sel-high{fill:rgba(248,113,113,0.35);stroke:var(--red)}
.zone-detail{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.zone-detail-title{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.zone-close{color:var(--text3);cursor:pointer;font-size:18px}
.pain-scale{display:flex;gap:4px;margin-bottom:8px}
.pain-btn{flex:1;height:34px;border-radius:var(--rxs);border:1px solid var(--border);background:var(--bg3);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.pain-btn.p-low{background:rgba(74,222,128,0.2);border-color:rgba(74,222,128,0.4);color:var(--green)}
.pain-btn.p-med{background:rgba(251,191,36,0.2);border-color:rgba(251,191,36,0.4);color:var(--amber)}
.pain-btn.p-high{background:rgba(248,113,113,0.2);border-color:rgba(248,113,113,0.4);color:var(--red)}
.pain-note-inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rxs);padding:8px 10px;color:var(--text);font-size:13px;outline:none;margin-top:8px;resize:none;height:60px}
.pain-note-inp:focus{border-color:var(--purple)}
.injury-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.injury-item{background:var(--bg3);border-radius:var(--rsm);padding:10px 12px;display:flex;align-items:center;gap:10px}
.injury-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.injury-info{flex:1;min-width:0}
.injury-zone{font-size:13px;font-weight:500}
.injury-pain{font-size:11px;color:var(--text3);margin-top:1px}
.injury-trend{font-size:11px;margin-left:auto;flex-shrink:0}

/* PROGRESS */
.prog-week-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.prog-week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.prog-week-title{font-size:14px;font-weight:600}
.prog-week-date{font-size:11px;color:var(--text3)}
.session-dots{display:flex;gap:6px;margin-bottom:10px}
.session-dot{height:6px;border-radius:3px;flex:1;background:var(--border2)}
.session-dot.done{background:var(--purple)}
.prog-ex-list{display:flex;flex-direction:column;gap:4px}
.prog-ex-item{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:7px 10px;background:var(--bg3);border-radius:var(--rxs)}
.prog-ex-name{color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-ex-vals{display:flex;gap:10px;color:var(--text3);font-size:11px;flex-shrink:0}
.prog-val{display:flex;flex-direction:column;align-items:center;gap:1px}
.prog-val b{color:var(--text);font-size:12px;font-weight:500}
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.week-nav-btn{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.week-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.week-nav-label{flex:1;text-align:center;font-size:13px;font-weight:500}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.6}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-val{font-size:26px;font-weight:700;color:var(--purple)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.chart-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.chart-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.chart-rows{display:flex;flex-direction:column;gap:8px}
.chart-row{display:flex;align-items:center;gap:8px}
.chart-lbl{font-size:11px;color:var(--text3);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-bar-bg{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px;background:var(--purple);transition:width .4s}
.chart-val{font-size:11px;color:var(--text2);min-width:30px;text-align:right}
.streak-row{display:flex;gap:5px}
.streak-dot{width:30px;height:30px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3)}
.streak-dot.done{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(139,124,248,0.35)}

/* TEAMS */
.team-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.team-card:hover{border-color:var(--border2)}
.team-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.team-name{font-size:15px;font-weight:600}
.team-sport-badge{font-size:10px;padding:3px 8px;border-radius:20px;background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.team-meta{font-size:12px;color:var(--text3)}
.team-detail-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back-btn{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.team-detail-title{font-size:16px;font-weight:700;flex:1}
.training-day-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.training-day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.training-day-title{font-size:14px;font-weight:600}
.training-day-body{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.training-day-inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rxs);padding:10px;color:var(--text);font-size:13px;outline:none;resize:vertical;min-height:100px;line-height:1.6}
.training-day-inp:focus{border-color:var(--purple)}
.player-note{background:var(--bg3);border-radius:var(--rsm);padding:10px 12px;margin-top:8px;display:flex;align-items:flex-start;gap:8px}
.player-note-name{font-size:12px;font-weight:600;color:var(--purple);min-width:70px}
.player-note-text{font-size:12px;color:var(--text2);flex:1}
.icon-btn{display:flex;align-items:center;justify-content:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rxs);cursor:pointer;color:var(--text3);transition:all .15s}

/* ADMIN PANEL */
.admin-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.admin-section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:12px 14px;border-bottom:1px solid var(--border)}
.admin-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);font-size:14px}
.admin-item:last-child{border-bottom:none}
.admin-item-lbl{color:var(--text)}
.admin-item-sub{font-size:11px;color:var(--text3);margin-top:2px}
.abtn{padding:6px 12px;border-radius:var(--rxs);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer}
.abtn-p{background:var(--purple-dim);color:var(--purple);border-color:rgba(139,124,248,0.3)}
.abtn-d{background:var(--red-dim);color:var(--red);border-color:rgba(248,113,113,0.3)}

/* PROFILE MENU */
.profile-menu{position:fixed;top:50px;right:12px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:8px;min-width:180px;z-index:400;display:none}
.profile-menu.open{display:block}
.profile-menu-item{padding:10px 12px;border-radius:var(--rsm);cursor:pointer;font-size:14px;color:var(--text2);transition:background .15s}
.profile-menu-item:hover{background:var(--bg3);color:var(--text)}
.profile-menu-item.danger{color:var(--red)}
.profile-menu-sep{border-top:1px solid var(--border);margin:4px 0}
.profile-info{padding:10px 12px;border-bottom:1px solid var(--border);margin-bottom:4px}
.profile-info-name{font-size:14px;font-weight:600}
.profile-info-email{font-size:11px;color:var(--text3);margin-top:2px}
.profile-info-role{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--purple-dim);color:var(--purple);display:inline-block;margin-top:4px}

/* SETTINGS */
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid var(--border);font-size:14px}
.settings-item:last-child{border-bottom:none}
.settings-lbl{color:var(--text)}
.settings-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 16px;font-size:13px;color:var(--text);opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:600}
.loading-logo{font-size:32px;font-weight:800;letter-spacing:-.03em;color:var(--text)}
.loading-logo span{color:var(--purple)}
</style>

// ── AUTH MODE ─────────────────────────────────────────────────
let authMode = 'login';
function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('auth-sub').textContent = authMode === 'login' ? 'Tu sistema de entrenamiento' : 'Crear cuenta nueva';
  document.getElementById('auth-btn').textContent = authMode === 'login' ? 'Iniciar sesión' : 'Registrarse';
  document.getElementById('auth-name').style.display = authMode === 'register' ? 'block' : 'none';
  document.getElementById('auth-switch').innerHTML = authMode === 'login'
    ? '¿No tenés cuenta? <span>Registrarse</span>'
    : '¿Ya tenés cuenta? <span>Iniciar sesión</span>';
  document.getElementById('auth-err').textContent = '';
}
window.toggleAuthMode = toggleAuthMode;

async function authAction() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const name = document.getElementById('auth-name').value.trim();
  const errEl = document.getElementById('auth-err');
  errEl.textContent = '';
  try {
    if (authMode === 'register') {
      if (!name) { errEl.textContent = 'Ingresá tu nombre'; return; }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, 'users', cred.user.uid), {
        name, email, role: 'athlete', createdAt: serverTimestamp()
      });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e) {
    const msgs = {
      'auth/user-not-found':'Email no encontrado',
      'auth/wrong-password':'Contraseña incorrecta',
      'auth/email-already-in-use':'Email ya registrado',
      'auth/weak-password':'Contraseña muy corta (mín. 6 caracteres)',
      'auth/invalid-email':'Email inválido',
      'auth/invalid-credential':'Email o contraseña incorrectos',
    };
    errEl.textContent = msgs[e.code] || e.message;
  }
}
window.authAction = authAction;

async function signOut() {
  await fbSignOut(auth);
  toggleProfileMenu(true);
}
window.signOut = signOut;

// ── AUTH STATE ────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  document.getElementById('loading').style.display = 'none';
  if (!user) {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return;
  }
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  S.user = user;
  S.isAdmin = user.email === ADMIN_EMAIL;

  // Load user data from Firestore
  const uRef = doc(db, 'users', user.uid);
  const uSnap = await getDoc(uRef);
  if (uSnap.exists()) {
    S.userData = uSnap.data();
  } else {
    S.userData = { name: user.email.split('@')[0], email: user.email, role: 'athlete' };
    await setDoc(uRef, { ...S.userData, createdAt: serverTimestamp() });
  }

  // Load personal data
  const pRef = doc(db, 'personal', user.uid);
  const pSnap = await getDoc(pRef);
  if (pSnap.exists()) {
    const d = pSnap.data();
    if (d.videos) S.videos = d.videos;
    if (d.history) S.history = d.history;
    if (d.wellness) S.wellness = d.wellness;
    if (d.injuries) S.injuries = d.injuries;
    if (d.currentWeek) S.currentWeek = d.currentWeek;
    if (d.startDate) S.startDate = d.startDate;
    if (d.library) S.library = d.library;
    // blocks only loaded for admin (athletes get them from assigned routine)
    if (S.isAdmin && d.blocks) S.blocks = d.blocks;
  }

  if (S.isAdmin) {
    // Load teams
    const tSnap = await getDocs(collection(db, 'teams'));
    S.teams = tSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Load all routines
    const rSnap = await getDocs(collection(db, 'routines'));
    S.routines = rSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  } else {
    // Athlete: load assigned routine from their user doc
    const assignedId = S.userData.assignedRoutine || null;
    if (assignedId) {
      const rSnap = await getDoc(doc(db, 'routines', assignedId));
      if (rSnap.exists()) {
        S.assignedRoutine = { id: assignedId, ...rSnap.data() };
        S.currentRoutineSessions = Object.keys(S.assignedRoutine.sessions || {});
        if (S.currentRoutineSessions.length) S.currentSession = S.currentRoutineSessions[0];
        // blocks are read-only from routine; don't overwrite with personal
      }
    }
  }

  // Update profile menu
  document.getElementById('pm-name').textContent = S.userData.name || '—';
  document.getElementById('pm-email').textContent = S.userData.email || '—';
  document.getElementById('pm-role').textContent = S.isAdmin ? 'admin' : 'atleta';
  document.getElementById('avatar-btn').textContent = (S.userData.name || 'U')[0].toUpperCase();
  if (S.isAdmin) {
    document.getElementById('pm-admin').style.display = 'block';
    document.getElementById('bb-teams').style.display = 'flex';
  } else {
    document.getElementById('bb-teams').style.display = 'none';
  }

  renderAll();
});

// ── SAVE ──────────────────────────────────────────────────────
let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirestore, 1500);
}

async function saveToFirestore() {
  if (!S.user) return;
  try {
    // Athletes with assigned routines don't save blocks (read-only from routine)
    const dataToSave = {
      videos: S.videos, history: S.history,
      wellness: S.wellness, injuries: S.injuries,
      currentWeek: S.currentWeek, startDate: S.startDate,
      updatedAt: serverTimestamp()
    };
    if (S.isAdmin) {
      // Admin saves their own personal blocks AND library
      dataToSave.blocks = S.blocks;
      dataToSave.library = S.library;
    }
    await setDoc(doc(db, 'personal', S.user.uid), dataToSave, { merge: true });
  } catch(e) { console.error('Save error', e); }
}

// ── HELPERS ───────────────────────────────────────────────────
function genId() { return 'x' + Date.now() + Math.floor(Math.random()*9999); }
function sessionKey(w,s) { return `w${w}-${s}`; }
function getSD(w,s) {
  const k=sessionKey(w,s);
  if(!S.history[k]) S.history[k]={date:null,exercises:{},rpe:7.5,done:false};
  return S.history[k];
}
function getED(w,s,id) {
  const sd=getSD(w,s);
  if(!sd.exercises[id]) sd.exercises[id]={series:'',reps:'',pct:'',ms:'',load:'',rpe:'',checked:false};
  return sd.exercises[id];
}
function weekLabel(w) {
  const base=new Date(S.startDate);
  base.setDate(base.getDate()+(w-1)*7);
  const end=new Date(base); end.setDate(end.getDate()+6);
  const f=d=>d.toLocaleDateString('es-AR',{day:'numeric',month:'short'});
  return `${f(base)} – ${f(end)}`;
}
function rpeDesc(v) {
  v=parseFloat(v);
  if(v<=6) return 'suave';
  if(v<=7) return 'moderado';
  if(v<=8.5) return 'moderado–alto';
  return 'alto';
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function countChecked(w) {
  let n=0;
  getSessionList().forEach(s=>{
    const sd=getSD(w,s);
    Object.values(sd.exercises).forEach(e=>{if(e.checked)n++;});
  });
  return n;
}

// ── VIEWS ─────────────────────────────────────────────────────
function switchView(v) {
  S.currentView=v;
  ['session','progress','wellness','stats','teams','settings','admin'].forEach(n=>{
    const el=document.getElementById('bb-'+n);
    if(el) el.classList.toggle('active',n===v);
  });
  renderAll();
}
window.switchView = switchView;

function renderAll() { renderSubnav(); renderMain(); }

function renderSubnav() {
  const nav=document.getElementById('subnav');
  document.getElementById('week-pill').textContent=`Semana ${S.currentWeek}`;
  if(S.currentView!=='session') { nav.innerHTML=''; return; }
  // Sessions: for admin use A/B/C/D; for athlete with routine use routine session names
  const sessions = getSessionList();
  nav.innerHTML=sessions.map(s=>{
    const sd=getSD(S.currentWeek,s);
    const done=sd.done;
    const active=S.currentSession===s;
    return `<button class="snav-tab ${active?'active':''} ${done&&!active?'done':''}"
      onclick="selectSession('${s}')">${done&&!active?'✓ ':''}${s}</button>`;
  }).join('');
}

function getSessionList() {
  if (S.isAdmin) return ['A','B','C','D'];
  if (S.assignedRoutine && S.currentRoutineSessions.length) return S.currentRoutineSessions;
  return ['A','B','C','D'];
}
window.getSessionList=getSessionList;

function getCurrentBlocks() {
  if (S.isAdmin) return S.blocks;
  if (S.assignedRoutine) {
    const ses = S.assignedRoutine.sessions || {};
    return ses[S.currentSession] || [];
  }
  return S.blocks;
}
window.getCurrentBlocks=getCurrentBlocks;

function selectSession(s) {
  S.currentSession=s; renderAll();
}
window.selectSession = selectSession;

function renderMain() {
  const m=document.getElementById('main');
  switch(S.currentView) {
    case 'session':  m.innerHTML=renderSession(); break;
    case 'progress': m.innerHTML=renderProgress(); break;
    case 'wellness': m.innerHTML=renderWellness(); break;
    case 'stats':    m.innerHTML=renderStats(); break;
    case 'teams':    m.innerHTML=renderTeams(); break;
    case 'settings': m.innerHTML=renderSettings(); break;
    case 'admin':    m.innerHTML=renderAdmin(); break;
    default:         m.innerHTML='';
  }
}

// ── SESSION ───────────────────────────────────────────────────
function renderSession() {
  const blocks = getCurrentBlocks();
  if (!blocks.length) {
    return `<div class="empty-state">Sin rutina asignada.<br><span style="font-size:12px">Tu entrenador va a asignarte una rutina pronto.</span></div>`;
  }
  return blocks.map(b=>renderBlock(b)).join('')
    + `<button class="finish-btn" onclick="finishSession()">✓ Marcar sesión como completada</button>`;
}

function renderBlock(b) {
  const cc=b.colorKey||'bx';
  const open=b._open!==false;
  const exampleColors = {b1:'var(--teal)',b2:'var(--blue)',b3:'var(--purple)',b4:'var(--amber)',bx:'var(--text2)'};
  let inner=`<p class="block-note">${b.note||''}</p>`;
  b.categories.forEach((cat,ci)=>{
    inner+=`<div class="cat-header">
      <div class="cat-label-wrap">
        <span class="cat-label" ondblclick="editCatLabel(this,'${b.id}',${ci})">${cat.label}</span>
        <input class="cat-label-inp" id="catinp-${b.id}-${ci}" onblur="saveCatLabel('${b.id}',${ci},this)" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      ${S.isAdmin?`<span class="cat-del" onclick="deleteCat('${b.id}',${ci})">− cat</span>`:''}
    </div>`;
    cat.exercises.forEach(ex=>{ inner+=renderExRow(ex,b.id,ci); });
    if(S.isAdmin) {
      inner+=`<button class="add-btn" onclick="openLib('${b.id}',${ci})">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Agregar ejercicio</button>`;
    }
    if(ci<b.categories.length-1) inner+=`<hr class="cat-divider">`;
  });
  if(S.isAdmin) {
    inner+=`<button class="add-btn" style="margin-top:10px;color:var(--text3);border-top:1px solid var(--border);padding-top:10px" onclick="addCategory('${b.id}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Agregar subcategoría</button>`;
  }
  if(b.hasRPE) {
    const sd=getSD(S.currentWeek,S.currentSession);
    const rpe=sd.rpe||7.5;
    inner+=`<div class="rpe-row">
      <span class="rpe-lbl">RPE objetivo:</span>
      <input type="range" class="rpe-slider" min="5" max="10" step="0.5" value="${rpe}" oninput="setRPE(this.value)">
      <span class="rpe-val" id="rpe-val">${rpe}</span>
      <span class="rpe-desc" id="rpe-desc">${rpeDesc(rpe)}</span>
    </div>`;
  }
  return `<div class="card block ${cc} ${open?'open':''}" id="block-${b.id}">
    <div class="block-header" onclick="toggleBlock('${b.id}')">
      <span class="block-badge">${b.label}</span>
      <div class="block-title-wrap">
        <span class="block-title" ${S.isAdmin?`ondblclick="editBlockTitle(event,'${b.id}')"`:''}>${b.title}</span>
        <input class="block-title-inp" id="btinp-${b.id}" onblur="saveBlockTitle('${b.id}',this)" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      <span class="block-time">${b.time}</span>
      ${S.isAdmin?`<span class="block-del" onclick="deleteBlock(event,'${b.id}')">×</span>`:''}
      <span class="block-chevron">›</span>
    </div>
    <div class="block-body">${inner}</div>
  </div>`;
}

function renderExRow(ex,blockId,catIdx,forceReadOnly=false) {
  const d=getED(S.currentWeek,S.currentSession,ex.id);
  const hasV=!!S.videos[ex.id];
  const canEdit=S.isAdmin && !forceReadOnly;
  const isAthleteMode=!S.isAdmin && !!S.assignedRoutine;
  // Routine prescription values (from routine definition or admin-set in exercise)
  const prescSeries = ex.series||'';
  const prescReps   = ex.reps||'';
  const prescPct    = ex.pct||'';
  const prescNote   = ex.note||'';
  // If athlete mode: show prescribed values as read-only, only allow editing load + rpe actual
  const vbtF=ex.vbt?`<div class="field-box"><span class="field-lbl">m/s</span>
    <input class="field-inp vbt" type="number" step="0.01" placeholder="0.00" value="${d.ms||''}"
      ${isAthleteMode?'readonly style="opacity:.5;pointer-events:none"':''}
      onchange="setField('${ex.id}','ms',this.value)"></div>`:'';
  // Prescription display for athlete (read-only pill row above fields)
  const prescRow = isAthleteMode && (prescSeries||prescReps||prescPct) ? `
    <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
      ${prescSeries?`<span style="font-size:11px;background:var(--purple-dim);color:var(--purple);padding:2px 8px;border-radius:20px;border:1px solid rgba(139,124,248,0.3)">${prescSeries} series</span>`:''}
      ${prescReps?`<span style="font-size:11px;background:var(--blue-dim);color:var(--blue);padding:2px 8px;border-radius:20px;border:1px solid rgba(96,165,250,0.3)">${prescReps} reps</span>`:''}
      ${prescPct?`<span style="font-size:11px;background:var(--teal-dim);color:var(--teal);padding:2px 8px;border-radius:20px;border:1px solid rgba(45,212,191,0.3)">${prescPct}%RM</span>`:''}
      ${prescNote?`<span style="font-size:11px;color:var(--text3);font-style:italic">${prescNote}</span>`:''}
    </div>` : '';
  return `<div class="ex-row" id="exrow-${ex.id}">
    <div class="ex-check ${d.checked?'checked':''}" onclick="toggleCheck('${ex.id}')"></div>
    <div class="ex-main">
      <div class="ex-name-row">
        <span class="ex-name" ${canEdit?`ondblclick="editExName(this,'${ex.id}','${blockId}',${catIdx})"`:''}>${ex.name}</span>
        <input class="ex-name-inp" id="exinp-${ex.id}" ${canEdit?`onblur="saveExName('${ex.id}','${blockId}',${catIdx},this)" onkeydown="if(event.key==='Enter')this.blur()"`:''}>
        <div class="ex-actions">
          <div class="ex-icon-btn ${hasV?'has-video':''}" onclick="openVideoModal('${ex.id}','${ex.name}')" title="Video">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          ${canEdit?`<div class="ex-icon-btn del-ex" onclick="deleteExercise('${ex.id}','${blockId}',${catIdx})" title="Eliminar">×</div>`:''}
        </div>
      </div>
      ${prescRow}
      <div class="ex-fields">
        ${isAthleteMode ? `
          <div class="field-box"><span class="field-lbl" style="color:var(--green)">Carga real (kg)</span>
            <input class="field-inp load" type="text" placeholder="—" value="${d.load||''}" onchange="setField('${ex.id}','load',this.value)" style="border-color:rgba(74,222,128,0.4)"></div>
          <div class="field-box"><span class="field-lbl" style="color:var(--amber)">RPE real</span>
            <input class="field-inp" type="text" placeholder="—" value="${d.rpe||''}" onchange="setField('${ex.id}','rpe',this.value)" style="border-color:rgba(251,191,36,0.4)"></div>
          ${vbtF}
        ` : `
          <div class="field-box"><span class="field-lbl">Series</span>
            <input class="field-inp" type="text" placeholder="3x" value="${d.series||''}" onchange="setField('${ex.id}','series',this.value)"></div>
          <div class="field-box"><span class="field-lbl">Reps</span>
            <input class="field-inp" type="text" placeholder="6–8" value="${d.reps||''}" onchange="setField('${ex.id}','reps',this.value)"></div>
          <div class="field-box"><span class="field-lbl">%RM</span>
            <input class="field-inp" type="text" placeholder="—" value="${d.pct||''}" onchange="setField('${ex.id}','pct',this.value)"></div>
          ${vbtF}
          <div class="field-box"><span class="field-lbl">Carga (kg)</span>
            <input class="field-inp load" type="text" placeholder="—" value="${d.load||''}" onchange="setField('${ex.id}','load',this.value)"></div>
          <div class="field-box"><span class="field-lbl">RPE</span>
            <input class="field-inp" type="text" placeholder="—" value="${d.rpe||''}" onchange="setField('${ex.id}','rpe',this.value)"></div>
        `}
      </div>
    </div>
  </div>`;
}

function renderLibFilters() {
  const f=document.getElementById('lib-filters');
  f.innerHTML=[{id:null,label:'Todos'},...ALL_FILTERS.map(t=>({id:t,label:t}))].map(ft=>
    `<span class="filter-chip ${S.activeFilter===ft.id?'active':''}" onclick="setFilter('${ft.id}')">${ft.label}</span>`
  ).join('');
}

function setFilter(f) {
  S.activeFilter=f==='null'?null:f;
  renderLibFilters(); renderLibList();
}
window.setFilter=setFilter;

function renderLibList() {
  const q=document.getElementById('lib-search').value.toLowerCase();
  const list=document.getElementById('lib-list');
  let items=S.library.filter(ex=>{
    const matchQ=!q||ex.name.toLowerCase().includes(q);
    const matchF=!S.activeFilter||ex.tags?.includes(S.activeFilter);
    return matchQ&&matchF;
  });
  if(!items.length) { list.innerHTML=`<div class="empty-state">No se encontraron ejercicios</div>`; return; }
  list.innerHTML=items.map(ex=>`
    <div class="lib-item" onclick="addFromLib('${ex.id}')">
      <span class="lib-name">${ex.name}</span>
      <div class="lib-tags">${(ex.tags||[]).slice(0,2).map(t=>`<span class="lib-tag">${t}</span>`).join('')}</div>
      <span class="lib-add-icon">+</span>
    </div>`).join('');
}
window.renderLibList=renderLibList;

function addFromLib(libId) {
  const libEx=S.library.find(e=>e.id===libId); if(!libEx||!S.libTarget) return;
  const {blockId,catIdx,sessionName,isRoutine}=S.libTarget;
  if(isRoutine && S.editingRoutine) {
    // Adding to routine editor
    const b=(S.editingRoutine.sessions[sessionName]||[]).find(x=>x.id===blockId);
    if(!b) return;
    const newEx={id:genId(),name:libEx.name,series:'',reps:'',pct:'',rpe:'',note:''};
    b.categories[catIdx].exercises.push(newEx);
    closeLib(); renderMain();
  } else {
    // Adding to admin's personal session
    const b=S.blocks.find(x=>x.id===blockId); if(!b) return;
    const newEx={id:genId(),name:libEx.name};
    b.categories[catIdx].exercises.push(newEx);
    scheduleSave(); closeLib(); renderMain();
  }
  showToast(`✓ ${libEx.name} agregado`);
}
window.addFromLib=addFromLib;

function createAndAddExercise() {
  const name=document.getElementById('lib-new-name').value.trim();
  if(!name) return;
  const newLibEx={id:genId(),name,tags:[]};
  S.library.push(newLibEx);
  if(S.libTarget) {
    const {blockId,catIdx,sessionName,isRoutine}=S.libTarget;
    if(isRoutine && S.editingRoutine) {
      const b=(S.editingRoutine.sessions[sessionName]||[]).find(x=>x.id===blockId);
      if(b) b.categories[catIdx].exercises.push({id:genId(),name,series:'',reps:'',pct:'',rpe:'',note:''});
      closeLib(); renderMain();
    } else {
      const b=S.blocks.find(x=>x.id===blockId);
      if(b) b.categories[catIdx].exercises.push({id:genId(),name});
      scheduleSave(); closeLib(); renderMain();
    }
  }
  document.getElementById('lib-new-name').value='';
  showToast(`✓ Ejercicio creado`);
}
window.createAndAddExercise=createAndAddExercise;

// ── WELLNESS ──────────────────────────────────────────────────
function renderWellness() {
  const today=new Date().toISOString().split('T')[0];
  const wKey=today;
  if(!S.wellness[wKey]) S.wellness[wKey]={};
  const w=S.wellness[wKey];

  let hooperScore=0; let allFilled=true;
  HOOPER_ITEMS.forEach(item=>{ if(w[item.key]) hooperScore+=w[item.key]; else allFilled=false; });

  const stateLabel = allFilled
    ? (hooperScore<=16?'En buena forma 💪':hooperScore<=24?'Normal':'Fatigado 😴')
    : '—';
  const stateColor = allFilled
    ? (hooperScore<=16?'var(--green)':hooperScore<=24?'var(--amber)':'var(--red)')
    : 'var(--text3)';

  let html=`<div class="wellness-card">
    <div class="wellness-title">Hooper Index — Hoy</div>
    <div class="wellness-sub">Puntuá cada ítem del 1 (muy bien) al 7 (muy mal)</div>`;

  HOOPER_ITEMS.forEach(item=>{
    const val=w[item.key]||0;
    const btns=Array.from({length:7},(_,i)=>{
      const v=i+1;
      return `<button class="hooper-btn ${val===v?'sel':''}" onclick="setHooper('${wKey}','${item.key}',${v})">${v}</button>`;
    }).join('');
    html+=`<div class="hooper-item">
      <div class="hooper-label">${item.label} <span>${val||'—'}</span></div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px;display:flex;justify-content:space-between"><span>${item.lo}</span><span>${item.hi}</span></div>
      <div class="hooper-scale">${btns}</div>
    </div>`;
  });

  html+=`<div class="hooper-result">
    <div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:2px">Score total</div>
      <div class="hooper-score" style="color:${stateColor}">${allFilled?hooperScore:'—'}</div>
    </div>
    <div class="hooper-state" style="color:${stateColor}">${stateLabel}
      <div style="font-size:11px;color:var(--text3);margin-top:2px">Rango: 6–42<br>≤16 bien · ≤24 normal · >24 fatigado</div>
    </div>
  </div>
  ${allFilled?`<button class="wellness-submit" onclick="submitWellness('${wKey}')">Guardar registro</button>`:''}
  </div>`;

  // Body map
  html+=`<div class="wellness-card">
    <div class="wellness-title">Mapa de molestias</div>
    <div class="wellness-sub">Tocá la zona donde sentís molestia</div>
    <div class="body-map-wrap">
      <div class="body-svg-wrap">
        ${renderBodySVG('front')}
        <div class="body-svg-label">Frente</div>
      </div>
      <div class="body-svg-wrap">
        ${renderBodySVG('back')}
        <div class="body-svg-label">Espalda</div>
      </div>
    </div>
    ${S.selectedZone ? renderZoneDetail() : ''}
    ${renderInjuryList()}
  </div>`;

  return html;
}

function renderBodySVG(side) {
  const zones=BODY_ZONES[side];
  const shapes=zones.map(z=>{
    const inj=S.injuries[z.id];
    let cls='body-zone';
    if(inj) { const p=inj.pain; cls+=p>=8?' sel-high':p>=4?' sel-med':' sel-low'; }
    const click=`onclick="selectZone('${z.id}')"`;
    const tip=`<title>${z.label}</title>`;
    if(z.type==='circle') {
      return `<circle class="${cls}" cx="${z.cx}" cy="${z.cy}" r="${z.r}" ${click}>${tip}</circle>`;
    } else {
      return `<ellipse class="${cls}" cx="${z.cx}" cy="${z.cy}" rx="${z.rx}" ry="${z.ry}" ${click}>${tip}</ellipse>`;
    }
  }).join('');
  return `<svg viewBox="0 0 200 335" xmlns="http://www.w3.org/2000/svg" style="width:100%">${shapes}</svg>`;
}

function renderZoneDetail() {
  const zid=S.selectedZone;
  const allZones=[...BODY_ZONES.front,...BODY_ZONES.back];
  const zone=allZones.find(z=>z.id===zid); if(!zone) return '';
  const inj=S.injuries[zid]||{pain:0,note:'',date:''};
  const painBtns=Array.from({length:11},(_,i)=>{
    const cls=inj.pain===i?(i>=8?'pain-btn p-high':i>=4?'pain-btn p-med':'pain-btn p-low'):'pain-btn';
    return `<button class="${cls}" onclick="setPain('${zid}',${i})">${i}</button>`;
  }).join('');
  return `<div class="zone-detail">
    <div class="zone-detail-title">${zone.label}
      <span class="zone-close" onclick="S.selectedZone=null;renderMain()">×</span>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Dolor 0–10</div>
    <div class="pain-scale">${painBtns}</div>
    <textarea class="pain-note-inp" placeholder="Observaciones..." onchange="setPainNote('${zid}',this.value)">${inj.note||''}</textarea>
    <button class="wellness-submit" onclick="saveInjury('${zid}')">Guardar molestia</button>
  </div>`;
}

function renderInjuryList() {
  const allZones=[...BODY_ZONES.front,...BODY_ZONES.back];
  const active=Object.entries(S.injuries).filter(([,v])=>v.pain>0);
  if(!active.length) return `<div style="font-size:12px;color:var(--text3);text-align:center;padding:12px">Sin molestias registradas</div>`;
  return `<div class="injury-list">${active.map(([id,inj])=>{
    const zone=allZones.find(z=>z.id===id);
    const col=inj.pain>=8?'var(--red)':inj.pain>=4?'var(--amber)':'var(--green)';
    const lbl=inj.pain>=8?'Dolor':inj.pain>=4?'Molestia':'Leve';
    const hist=inj.history||[];
    const trend=hist.length>1?(hist[hist.length-1].pain<hist[hist.length-2].pain?'↓ Mejorando':hist[hist.length-1].pain>hist[hist.length-2].pain?'↑ Empeorando':'→ Estable'):'';
    return `<div class="injury-item">
      <div class="injury-dot" style="background:${col}"></div>
      <div class="injury-info">
        <div class="injury-zone">${zone?.label||id}</div>
        <div class="injury-pain">Dolor: ${inj.pain}/10 · ${lbl}${inj.note?' · '+inj.note.slice(0,30):''}</div>
      </div>
      <div class="injury-trend" style="color:${col}">${trend}</div>
    </div>`;
  }).join('')}</div>`;
}

function setHooper(wKey,key,val) {
  if(!S.wellness[wKey]) S.wellness[wKey]={};
  S.wellness[wKey][key]=val; scheduleSave(); renderMain();
}
window.setHooper=setHooper;

function setPain(zid,val) {

}
window.setPain=setPain;

function setPainNote(zid,val) {

// ── PROGRESS ──────────────────────────────────────────────────
function renderProgress() {
  let w=S.progressView.week||S.currentWeek;
  w=Math.max(1,Math.min(w,S.currentWeek));
  S.progressView.week=w;

  let html=`<div class="week-nav">
    <button class="week-nav-btn" onclick="progWeek(-1)" ${w<=1?'disabled':''}>‹</button>
    <div class="week-nav-label">Semana ${w} · <span style="color:var(--text3);font-size:12px">${weekLabel(w)}</span></div>
    <button class="week-nav-btn" onclick="progWeek(1)" ${w>=S.currentWeek?'disabled':''}>›</button>
  </div>`;

  html+=`<div class="prog-week-card">
    <div class="prog-week-header"><span class="prog-week-title">Sesiones</span><span class="prog-week-date">${weekLabel(w)}</span></div>
    <div class="session-dots">${getSessionList().map(s=>`<div class="session-dot ${getSD(w,s).done?'done':''}" title="${s}"></div>`).join('')}</div>
  </div>`;

  const sessionList=getSessionList();
  const allExById={};
  getCurrentBlocks().forEach(b=>b.categories.forEach(c=>c.exercises.forEach(e=>{allExById[e.id]=e.name;})));
  const exData=[];
  getCurrentBlocks().forEach(b=>b.categories.forEach(c=>c.exercises.forEach(ex=>{
    const rows=sessionList.map(s=>({s,d:getED(w,s,ex.id),done:getSD(w,s).done}))
      .filter(r=>r.done&&(r.d.series||r.d.reps||r.d.load||r.d.ms));
    if(rows.length) exData.push({ex,rows});
  })));

  if(!exData.length) {
    html+=`<div class="empty-state">Sin datos registrados para esta semana.<br><span style="font-size:12px">Completá sesiones para ver progresión.</span></div>`;
  } else {
    html+=`<div class="prog-ex-list">`;
    exData.forEach(({ex,rows})=>{
      rows.forEach(r=>{
        const d=r.d;
        const serReps=[d.series,d.reps].filter(Boolean).join('×')||'—';
        const carga=d.load?`${d.load}kg`:d.pct?`${d.pct}%RM`:d.ms?`${d.ms}m/s`:'—';
        html+=`<div class="prog-ex-item">
          <span class="prog-ex-name">${ex.name}</span>
          <div class="prog-ex-vals">
            <div class="prog-val"><b>${serReps}</b><span>vol</span></div>
            <div class="prog-val"><b>${carga}</b><span>carga</span></div>
            <div class="prog-val"><b>Día ${r.s}</b><span></span></div>
          </div>
        </div>`;
      });
    });
    html+=`</div>`;
  }

  if(w>1) {
    const c=countChecked(w), p=countChecked(w-1), diff=c-p;
    html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:10px;font-size:13px;color:var(--text2)">
      vs semana ${w-1}: <b style="color:var(--purple)">${c}</b> ejercicios realizados
      ${diff>0?`<span style="color:var(--green)"> +${diff} ↑</span>`:diff<0?`<span style="color:var(--red)"> ${diff} ↓</span>`:'<span style="color:var(--text3)"> sin cambios</span>'}
    </div>`;
  }
  return html;
}

function progWeek(d) { S.progressView.week=(S.progressView.week||S.currentWeek)+d; renderMain(); }
window.progWeek=progWeek;

// ── STATS ─────────────────────────────────────────────────────
function renderStats() {
  const sessionList=getSessionList();
  let totalS=0,totalC=0;
  const freq={};
  for(let w=1;w<=S.currentWeek;w++) sessionList.forEach(s=>{
    const sd=getSD(w,s);
    if(sd.done) totalS++;
    Object.entries(sd.exercises).forEach(([id,d])=>{ if(d.checked){totalC++;freq[id]=(freq[id]||0)+1;} });
  });

  const today=new Date();
  const last7=Array.from({length:7},(_,i)=>{ const d=new Date(today); d.setDate(d.getDate()-6+i); return d.toISOString().split('T')[0]; });
  const doneDs=new Set();
  for(let w=1;w<=S.currentWeek;w++) sessionList.forEach(s=>{
    const sd=getSD(w,s); if(sd.done&&sd.date) doneDs.add(sd.date);
  });

  const allExById={};
  getCurrentBlocks().forEach(b=>b.categories.forEach(c=>c.exercises.forEach(e=>{allExById[e.id]=e.name;})));
  const topEx=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxF=topEx[0]?.[1]||1;

  // Wellness trend
  const wDays=Object.entries(S.wellness).sort((a,b)=>a[0].localeCompare(b[0])).slice(-7);
  const wScores=wDays.map(([d,w])=>{
    const s=HOOPER_ITEMS.reduce((acc,i)=>acc+(w[i.key]||0),0);
    return {d,s,allFilled:HOOPER_ITEMS.every(i=>w[i.key])};
  }).filter(x=>x.allFilled);

  return `
  <div class="stat-grid">
    <div class="stat-item"><div class="stat-val">${S.currentWeek}</div><div class="stat-lbl">Semanas</div></div>
    <div class="stat-item"><div class="stat-val">${totalS}</div><div class="stat-lbl">Sesiones</div></div>
    <div class="stat-item"><div class="stat-val">${totalC}</div><div class="stat-lbl">Ejercicios</div></div>
    <div class="stat-item"><div class="stat-val">${totalS>0?Math.round(totalC/totalS):0}</div><div class="stat-lbl">Ejerc./sesión</div></div>
  </div>
  <div class="chart-section">
    <div class="chart-title">Últimos 7 días</div>
    <div class="streak-row">${last7.map(d=>{
      const day=new Date(d+'T12:00:00').toLocaleDateString('es-AR',{weekday:'short'}).slice(0,2);
      return `<div class="streak-dot ${doneDs.has(d)?'done':''}">${day}</div>`;
    }).join('')}</div>
  </div>
  ${topEx.length?`<div class="chart-section">
    <div class="chart-title">Ejercicios más frecuentes</div>
    <div class="chart-rows">${topEx.map(([id,f])=>`
      <div class="chart-row">
        <span class="chart-lbl">${allExById[id]||'—'}</span>
        <div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${Math.round(f/maxF*100)}%"></div></div>
        <span class="chart-val">${f}x</span>
      </div>`).join('')}</div>
  </div>`:''}
  ${wScores.length?`<div class="chart-section">
    <div class="chart-title">Tendencia Hooper (últimos ${wScores.length} días)</div>
    <div class="chart-rows">${wScores.map(({d,s})=>{
      const col=s<=16?'var(--green)':s<=24?'var(--amber)':'var(--red)';
      return `<div class="chart-row">
        <span class="chart-lbl">${d.slice(5)}</span>
        <div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${Math.round(s/42*100)}%;background:${col}"></div></div>
        <span class="chart-val" style="color:${col}">${s}</span>
      </div>`;
    }).join('')}</div>
  </div>`:''}`;
}

async function createTeam() {
  const name=prompt('Nombre del equipo:'); if(!name) return;
  const sport=prompt('Deporte (ej: Handball, Básquet):','');
  const category=prompt('Categoría (ej: Liga de Honor):','');
  const team={id:genId(),name,sport:sport||'',category:category||'',players:[],trainingDays:[],createdAt:new Date().toISOString()};
  S.teams.push(team);
  await setDoc(doc(db,'teams',team.id),team);
  renderMain(); showToast('✓ Equipo creado');
}
window.createTeam=createTeam;

function openTeam(id) { S.teamView=S.teams.find(t=>t.id===id)||null; renderMain(); }
window.openTeam=openTeam;

function addTrainingDay(teamId) {
  const t=S.teams.find(x=>x.id===teamId); if(!t) return;
  if(!t.trainingDays) t.trainingDays=[];
  t.trainingDays.push({title:`Día ${t.trainingDays.length+1}`,content:'',playerNotes:[]});
  saveTeam(teamId); renderMain();
}
window.addTrainingDay=addTrainingDay;

function deleteDay(teamId,di) {
  const t=S.teams.find(x=>x.id===teamId); if(!t) return;
  if(!confirm('¿Eliminar este día?')) return;
  t.trainingDays.splice(di,1); saveTeam(teamId); renderMain();
}
window.deleteDay=deleteDay;

function toggleDayEdit(teamId,di) {
  const t=S.teams.find(x=>x.id===teamId); if(!t) return;
  t.trainingDays[di]._editing=!t.trainingDays[di]._editing;
  if(!t.trainingDays[di]._editing) saveTeam(teamId);
  renderMain();
}
window.toggleDayEdit=toggleDayEdit;

function editDayTitle(teamId,di) {
  const t=S.teams.find(x=>x.id===teamId); if(!t) return;
  t.trainingDays[di]._editing=true; renderMain();
  setTimeout(()=>{ const el=document.getElementById(`dttinp-${di}`); if(el){el.focus();el.select();} },50);
}
window.editDayTitle=editDayTitle;

function saveDayTitle(teamId,di,inp) {
  const t=S.teams.find(x=>x.id===teamId); if(!t) return;
  if(inp.value.trim()) t.trainingDays[di].title=inp.value.trim();
}
window.saveDayTitle=saveDayTitle;

function saveDayContent(teamId,di,val) {
  const t=S.teams.find(x=>x.id===teamId); if(!t) return;
  t.trainingDays[di].content=val;
}
window.saveDayContent=saveDayContent;

function addPlayerNote(teamId,di,inp) {
  const val=inp.value.trim(); if(!val) return;
  const t=S.teams.find(x=>x.id===teamId); if(!t) return;
  const parts=val.split(':');
  const player=parts.length>1?parts[0].trim():'Jugador';
  const note=parts.length>1?parts.slice(1).join(':').trim():val;
  if(!t.trainingDays[di].playerNotes) t.trainingDays[di].playerNotes=[];
  t.trainingDays[di].playerNotes.push({player,note});
  inp.value=''; saveTeam(teamId); renderMain();
}
window.addPlayerNote=addPlayerNote;

function deletePlayerNote(teamId,di,ni) {
  const t=S.teams.find(x=>x.id===teamId); if(!t) return;
  t.trainingDays[di].playerNotes.splice(ni,1); saveTeam(teamId); renderMain();
}
window.deletePlayerNote=deletePlayerNote;

function addPlayer(teamId) {
  const inp=document.getElementById('new-player-inp'); if(!inp) return;
  const name=inp.value.trim(); if(!name) return;
  const t=S.teams.find(x=>x.id===teamId); if(!t) return;
  if(!t.players) t.players=[];
  t.players.push(name); inp.value=''; saveTeam(teamId); renderMain();
}
window.addPlayer=addPlayer;

function deletePlayer(teamId,pi) {
  const t=S.teams.find(x=>x.id===teamId); if(!t) return;
  t.players.splice(pi,1); saveTeam(teamId); renderMain();
}
window.deletePlayer=deletePlayer;

async function deleteTeam(teamId) {
  if(!confirm('¿Eliminar este equipo?')) return;
  S.teams=S.teams.filter(t=>t.id!==teamId);
  S.teamView=null;
  // delete from firestore would need deleteDoc, skip for now
  renderMain(); showToast('Equipo eliminado');
}
window.deleteTeam=deleteTeam;

async function saveTeam(teamId) {
  const t=S.teams.find(x=>x.id===teamId); if(!t) return;
  try { await setDoc(doc(db,'teams',teamId),t); } catch(e) { console.error(e); }
}

        <div style="display:flex;justify-content:space-between;width:100%">
          <span style="font-size:13px;font-weight:500">${key}</span>
          <span style="font-size:11px;color:var(--text3)">${sd.date||''} · RPE ${sd.rpe||'—'}</span>
        </div>
        ${exEntries.slice(0,4).map(([id,e])=>`
          <div style="font-size:12px;color:var(--text2);display:flex;gap:10px">
            <span style="color:var(--text3);min-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${id}</span>
            ${e.load?`<span style="color:var(--green)">${e.load}kg</span>`:''}
            ${e.rpe?`<span style="color:var(--amber)">RPE ${e.rpe}</span>`:''}
          </div>`).join('')}
      </div>`;
    }).join(''):`<div style="padding:12px 14px;font-size:13px;color:var(--text3)">Sin sesiones registradas aún.</div>`}
  </div>

  <div class="admin-section">
    <div class="admin-section-title">Wellness — últimos 7 días</div>
    ${wEntries.length?wEntries.map(([date,w])=>{
      const score=HOOPER_ITEMS.reduce((a,i)=>a+(w[i.key]||0),0);
      const allFilled=HOOPER_ITEMS.every(i=>w[i.key]);
      if(!allFilled) return '';
      const col=score<=16?'var(--green)':score<=24?'var(--amber)':'var(--red)';
      return `<div class="admin-item">
        <span style="font-size:12px;color:var(--text3)">${date}</span>
        <span style="font-size:14px;font-weight:600;color:${col}">${score}</span>
      </div>`;
    }).join(''):`<div style="padding:12px 14px;font-size:13px;color:var(--text3)">Sin registros de wellness.</div>`}
  </div>

  <div class="admin-section">
    <div class="admin-section-title">Molestias activas</div>
    ${activeInj.length?`<div class="injury-list" style="padding:10px 14px">${activeInj.map(([id,inj])=>{
      const zone=allZones.find(z=>z.id===id);
      const col=inj.pain>=8?'var(--red)':inj.pain>=4?'var(--amber)':'var(--green)';
      return `<div class="injury-item">
        <div class="injury-dot" style="background:${col}"></div>
        <div class="injury-info">
          <div class="injury-zone">${zone?.label||id}</div>
          <div class="injury-pain">Dolor: ${inj.pain}/10${inj.note?' · '+inj.note.slice(0,40):''}</div>
        </div>
      </div>`;
    }).join('')}</div>`:`<div style="padding:12px 14px;font-size:13px;color:var(--text3)">Sin molestias registradas.</div>`}
  </div>`;

  return html;
}

async function assignRoutineToAthlete(uid) {
  const sel = document.getElementById('assign-routine-sel');
  if(!sel) return;
  const routineId = sel.value || null;
  try {
    await setDoc(doc(db,'users',uid), { assignedRoutine: routineId||null }, {merge:true});
    if(S.viewingAthlete?.userData) S.viewingAthlete.userData.assignedRoutine = routineId;
    // Also update local adminAthletes list
    const a = S.adminAthletes.find(x=>x.uid===uid);
    if(a) a.assignedRoutine = routineId;
    showToast(routineId?'✓ Rutina asignada':'Rutina removida');
    renderMain();
  } catch(e) { showToast('Error al asignar'); }
}
window.assignRoutineToAthlete=assignRoutineToAthlete;

async function changeAthleteWeek(uid, delta) {
  const p = S.viewingAthlete?.personal;
  if(!p) return;
  const cur = (p.currentWeek||1)+delta;
  if(cur<1) return;
  p.currentWeek = cur;
  try {
    await setDoc(doc(db,'personal',uid),{currentWeek:cur},{merge:true});
    showToast(`Semana actualizada: ${cur}`);
    renderMain();
  } catch(e) { showToast('Error'); }
}
window.changeAthleteWeek=changeAthleteWeek;

// ── ADMIN: ROUTINES ───────────────────────────────────────────
function adminGoRoutines() {
  S.adminView='routines';
  renderMain();
}
window.adminGoRoutines=adminGoRoutines;

function renderAdminRoutines() {
  let html=`<div class="team-detail-header">
    <button class="back-btn" onclick="S.adminView='main';renderMain()">‹</button>
    <div class="team-detail-title">Rutinas</div>
    <button class="abtn abtn-p" onclick="createRoutine()">+ Nueva</button>
  </div>`;
  if(!S.routines.length) {
    html+=`<div class="empty-state">No hay rutinas creadas.<br><span style="font-size:12px">Creá una rutina para asignarla a tus alumnos.</span></div>`;
  } else {
    html+=S.routines.map(r=>`
      <div class="card" style="padding:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:14px;font-weight:600">${r.name}</div>
          <div style="display:flex;gap:6px">
            <button class="abtn abtn-p" onclick="editRoutine('${r.id}')">Editar</button>
            <button class="abtn abtn-d" onclick="deleteRoutine('${r.id}')">×</button>
          </div>
        </div>
        <div style="font-size:12px;color:var(--text3)">
          ${Object.keys(r.sessions||{}).join(' · ')||'Sin sesiones'}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">
          Asignada a: ${S.adminAthletes.filter(a=>a.assignedRoutine===r.id).map(a=>a.name||a.email).join(', ')||'nadie'}
        </div>
      </div>`).join('');

  return html;
