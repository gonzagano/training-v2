<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Fondo Oscuro Completo (Estilo App de Noche) -->
  <rect width="100%" height="100%" fill="#111215"/>
  
  <g transform="translate(100, 80)">
    <!-- Barra Superior de la G -->
    <rect x="0" y="0" width="220" height="40" rx="8" fill="#FFFFFF"/>
    
    <!-- Barras Laterales Izquierdas (Simulando el gráfico que desciende y sube) -->
    <rect x="0" y="60" width="40" height="120" rx="8" fill="#FFFFFF"/>
    <rect x="0" y="200" width="220" height="40" rx="8" fill="#FFFFFF"/>
    
    <!-- Retorno de la G (Estructura interna) -->
    <rect x="180" y="120" width="40" height="120" rx="8" fill="#FFFFFF"/>
    <rect x="120" y="120" width="100" height="40" rx="8" fill="#FFFFFF"/>
    
    <!-- El Vector de Rendimiento (Métrica/Alerta en Verde Lima) -->
    <rect x="240" y="0" width="40" height="240" rx="8" fill="#CCFF00"/>
  </g>
  
  <!-- Texto Inferior Integrado -->
  <text x="250" y="410" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">G-METRICS</text>
  <text x="250" y="440" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#CCFF00" text-anchor="middle" letter-spacing="6">PERFORMANCE LAB</text>
</svg>
